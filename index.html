<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic HR Architecture Map - Full System Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: #e2e8f0; overflow-x: hidden; }
        
        @keyframes lineFlow {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }

        .animate-running-line {
            stroke-dasharray: 4, 8; 
            animation: lineFlow 1.2s linear infinite;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .touch-none { touch-action: none; }
        .node-transition { transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .glow-indigo { box-shadow: 0 0 25px rgba(99, 102, 241, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m15-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                chevron: <polyline points="9 18 15 12 9 6" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const Connection = ({ start, end, color, active, isFaint, isReporting, pulsing }) => {
            if (!start || !end) return null;
            const midX = (start.x + end.x) / 2;
            const path = `M ${start.x} ${start.y} C ${midX} ${start.y}, ${midX} ${end.y}, ${end.x} ${end.y}`;
            const opacity = active ? 'opacity-90' : (isFaint ? 'opacity-[0.02]' : (isReporting ? 'opacity-10' : 'opacity-15'));
            const strokeWidth = active ? "1.0" : "0.15";

            return (
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={isReporting ? "1 4" : "none"} className={`${opacity} transition-all duration-700 ease-in-out ${pulsing && active ? 'animate-running-line' : ''}`}/>
                </svg>
            );
        };

        function App() {
            const [viewMode, setViewMode] = useState('presentation');
            const [zoomLevel, setZoomLevel] = useState(0.8);
            const [hoveredNode, setHoveredNode] = useState(null);
            const [selectedNode, setSelectedNode] = useState(null);
            const [draggingNode, setDraggingNode] = useState(null);
            const containerRef = useRef(null);

            const activeNodeId = selectedNode || hoveredNode;
            const isAdmin = viewMode === 'admin';

            // --- FULL DATA RE-CONSOLIDATION ---
            const [data, setData] = useState({
                // Entities
                ent_ceg: { type: 'entity', title: "CEG CORP", employeeCount: 30, region: 'Singapore' },
                ent_enr: { type: 'entity', title: "Enrichment", employeeCount: 125, region: 'Singapore' },
                ent_hsk: { type: 'entity', title: "HSK", employeeCount: 10, region: 'Singapore' },
                ent_klc: { type: 'entity', title: "KLC", employeeCount: 100, region: 'Singapore' },
                ent_tgi: { type: 'entity', title: "TGI", employeeCount: 15, region: 'Singapore' },
                ent_vn: { type: 'entity', title: "Vietnam", employeeCount: 100, region: 'Overseas' },
                ent_aus: { type: 'entity', title: "Australia", employeeCount: 0, region: 'Overseas' },
                
                // Roles
                manager: { type: 'role', title: "HR Manager", subtitle: "Lead", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_vn', 'ent_aus'] },
                recruiter: { type: 'role', title: "HR Executive", subtitle: "Execution", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk'] },
                payroll: { type: 'role', title: "Payroll Specialist", subtitle: "Support", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'] },
                
                // MANAGER CATEGORIES
                cat_strategy: { type: 'category', title: "Strategic Leadership", belongsTo: 'manager', theme: 'indigo' },
                hr_strategy_task: { type: 'task', title: "Org Design & Policy", hours: 15, belongsToCat: "cat_strategy", theme: 'indigo' },

                // EXECUTIVE CATEGORIES
                cat_lifecycle: { type: 'category', title: "Employee Lifecycle", belongsTo: 'recruiter', theme: 'indigo' },
                cat_recruitment: { type: 'category', title: "Recruitment Support", belongsTo: 'recruiter', theme: 'indigo' },
                cat_ops: { type: 'category', title: "HR Operations", belongsTo: 'recruiter', theme: 'indigo' },
                cat_eng: { type: 'category', title: "Employee Engagement", belongsTo: 'recruiter', theme: 'indigo' },
                cat_rel: { type: 'category', title: "Relations & Support", belongsTo: 'recruiter', theme: 'indigo' },

                // EXECUTIVE DETAILS
                hr_onboarding: { type: 'task', title: "New Hire Onboarding", hours: 4, belongsToCat: "cat_lifecycle", theme: 'indigo' },
                hr_offboarding: { type: 'task', title: "Exit Clearances", hours: 2, belongsToCat: "cat_lifecycle", theme: 'indigo' },
                hr_job_post: { type: 'task', title: "Job Posting", hours: 3, belongsToCat: "cat_recruitment", theme: 'indigo' },
                hr_screening: { type: 'task', title: "Resume Screening", hours: 4, belongsToCat: "cat_recruitment", theme: 'indigo' },
                hr_records: { type: 'task', title: "Records Admin", hours: 3, belongsToCat: "cat_ops", theme: 'indigo' },
                hr_work_pass: { type: 'task', title: "Work Pass Admin", hours: 3, belongsToCat: "cat_ops", theme: 'indigo' },
                hr_policy: { type: 'task', title: "Policy Support", hours: 3, belongsToCat: "cat_rel", theme: 'indigo' },

                // PAYROLL CATEGORIES
                cat_pay_monthly: { type: 'category', title: "Monthly Payroll Ops", belongsTo: 'payroll', theme: 'emerald' },
                cat_pay_yearly: { type: 'category', title: "Yearly Compliance", belongsTo: 'payroll', theme: 'slate' },

                // PAYROLL DETAILS
                pay_salary: { type: 'task', title: "Salary Processing", hours: 25, belongsToCat: "cat_pay_monthly", theme: 'emerald' },
                pay_claims: { type: 'task', title: "Claims Processing", hours: 10, belongsToCat: "cat_pay_monthly", theme: 'emerald' },
                pay_tax_yr: { type: 'task', title: "Tax Processing", hours: 40, belongsToCat: "cat_pay_yearly", theme: 'slate' },
                pay_audit_yr: { type: 'task', title: "Payroll Auditing", hours: 20, belongsToCat: "cat_pay_yearly", theme: 'slate' }
            });

            const [coords, setCoords] = useState({
                ent_ceg: { x: 12, y: 10 }, ent_enr: { x: 12, y: 22 }, ent_hsk: { x: 12, y: 34 }, ent_klc: { x: 12, y: 46 }, ent_tgi: { x: 12, y: 58 }, ent_vn: { x: 12, y: 70 }, ent_aus: { x: 12, y: 82 },
                manager: { x: 38, y: 15 }, recruiter: { x: 38, y: 45 }, payroll: { x: 38, y: 75 },
                
                cat_strategy: { x: 65, y: 10 },
                cat_lifecycle: { x: 65, y: 30 }, cat_recruitment: { x: 65, y: 40 }, cat_ops: { x: 65, y: 50 }, cat_eng: { x: 65, y: 60 }, cat_rel: { x: 65, y: 70 },
                cat_pay_monthly: { x: 65, y: 85 }, cat_pay_yearly: { x: 65, y: 95 },

                hr_strategy_task: { x: 92, y: 10 },
                hr_onboarding: { x: 92, y: 28 }, hr_offboarding: { x: 92, y: 32 },
                hr_job_post: { x: 92, y: 38 }, hr_screening: { x: 92, y: 42 },
                hr_records: { x: 92, y: 48 }, hr_work_pass: { x: 92, y: 52 },
                hr_policy: { x: 92, y: 70 },
                pay_salary: { x: 92, y: 83 }, pay_claims: { x: 92, y: 87 },
                pay_tax_yr: { x: 92, y: 93 }, pay_audit_yr: { x: 92, y: 97 }
            });

            const getCategoryHours = (catKey) => {
                return Object.values(data).filter(n => n.belongsToCat === catKey).reduce((s, t) => s + (t.hours || 0), 0);
            };

            const getRoleHours = (roleKey) => {
                return Object.entries(data).filter(([k, v]) => v.belongsTo === roleKey).reduce((s, [k, v]) => s + getCategoryHours(k), 0);
            };

            // --- ADMIN HANDLERS ---
            const handlePointerDown = (e, key) => { if (isAdmin) { e.stopPropagation(); setDraggingNode(key); } };
            const handlePointerMove = (e) => {
                if (!draggingNode || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / (rect.width * zoomLevel)) * 100 * zoomLevel));
                const y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / (rect.height * zoomLevel)) * 100 * zoomLevel));
                setCoords(prev => ({ ...prev, [draggingNode]: { x, y } }));
            };

            const addNode = (type) => {
                const id = `${type}_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type, title: `New ${type}`, hours: 10 } }));
                setCoords(p => ({ ...p, [id]: { x: 50, y: 50 } }));
            };

            const deleteNode = (key) => {
                setData(p => { const n = {...p}; delete n[key]; return n; });
                setCoords(p => { const n = {...p}; delete n[key]; return n; });
            };

            const renderNode = (nodeKey) => {
                const nodeData = data[nodeKey];
                const { x, y } = coords[nodeKey] || { x: 50, y: 50 };
                const isEntity = nodeData.type === 'entity';
                const isRole = nodeData.type === 'role';
                const isCategory = nodeData.type === 'category';
                const isTask = nodeData.type === 'task';
                const isFocused = activeNodeId === nodeKey;
                const activeData = data[activeNodeId];

                let isRelated = false;
                if (activeNodeId) {
                    if (nodeKey === activeNodeId) isRelated = true;
                    else if (isEntity && activeData?.type === 'role') isRelated = activeData.reportsTo?.includes(nodeKey);
                    else if (isCategory && activeData?.type === 'role') isRelated = nodeData.belongsTo === activeNodeId;
                    else if (isRole && activeData?.type === 'category') isRelated = activeData.belongsTo === nodeKey;
                    else if (isTask && activeData?.type === 'category') isRelated = nodeData.belongsToCat === activeNodeId;
                    else if (isCategory && activeData?.type === 'task') isRelated = activeData.belongsToCat === nodeKey;
                }

                const isDimmed = activeNodeId && !isRelated;
                const themes = {
                    indigo: 'bg-indigo-950/80 border-indigo-500/50 text-indigo-100',
                    emerald: 'bg-emerald-950/80 border-emerald-500/50 text-emerald-100',
                    slate: 'bg-slate-800/80 border-slate-600/50 text-slate-100',
                    entity: 'bg-slate-900 border-white/10 text-white shadow-lg'
                };

                const hours = isCategory ? getCategoryHours(nodeKey) : (isRole ? getRoleHours(nodeKey) : (nodeData.hours || 0));

                return (
                    <div key={nodeKey} 
                        onClick={(e) => { e.stopPropagation(); if(!isAdmin) setSelectedNode(prev => prev === nodeKey ? null : nodeKey); }}
                        onPointerDown={(e) => handlePointerDown(e, nodeKey)}
                        onMouseEnter={() => setHoveredNode(nodeKey)} 
                        onMouseLeave={() => setHoveredNode(null)} 
                        className={`group absolute transform -translate-x-1/2 -translate-y-1/2 node-transition backdrop-blur-xl border 
                            ${isEntity ? themes.entity : (themes[nodeData.theme] || themes.indigo)} 
                            ${isEntity ? 'w-44 p-3 rounded-xl' : (isRole ? 'w-60 p-5 rounded-[2rem]' : (isCategory ? 'w-52 p-3 rounded-2xl' : 'w-44 p-2 rounded-full'))} 
                            ${isFocused ? 'glow-indigo ring-1 ring-indigo-400 z-[110] border-indigo-400 scale-105' : 'z-10'} 
                            ${isRelated && !isFocused ? 'border-indigo-500 ring-1 ring-indigo-500/20 z-[100]' : ''} 
                            ${isDimmed ? 'opacity-[0.05] scale-95 blur-[2px]' : 'cursor-pointer'}`} 
                        style={{ left: `${x}%`, top: `${y}%` }}
                    >
                        {isAdmin && (
                            <button onClick={(e) => {e.stopPropagation(); deleteNode(nodeKey)}} className="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-[120]"><Icon name="trash" size={10}/></button>
                        )}
                        {isEntity ? (
                            <div className="text-center">
                                <div className="text-[8px] font-black uppercase opacity-40 mb-1 leading-none tracking-widest">{nodeData.region}</div>
                                <div className="font-black text-xs uppercase tracking-tighter mb-2">{nodeData.title}</div>
                                <div className={`w-full py-1.5 rounded-lg flex items-center justify-center gap-1.5 transition-all ${isRelated ? 'bg-indigo-600' : 'bg-white/5'}`}>
                                    <Icon name="users" size={12}/><span className="text-sm font-black">{nodeData.employeeCount}</span>
                                </div>
                            </div>
                        ) : isRole ? (
                            <div className="flex flex-col">
                                <div className="flex justify-between items-center mb-4 text-left">
                                    <div className="text-[10px] font-black uppercase opacity-40 tracking-widest">{nodeData.subtitle}</div>
                                    <div className="px-2 py-0.5 rounded-lg bg-indigo-500/20 text-indigo-400 text-[9px] font-black border border-indigo-500/20">ROLE</div>
                                </div>
                                <div className="font-black text-lg leading-none mb-4 uppercase tracking-tighter text-left">{nodeData.title}</div>
                                <div className="bg-white/5 border border-white/5 rounded-xl p-3 shadow-inner">
                                    <div className="flex justify-between items-center mb-1.5">
                                        <span className="text-[9px] font-black opacity-40 uppercase tracking-widest text-left leading-none">Load Auto-Sum</span>
                                        <span className="text-xs font-black text-indigo-300 leading-none">{hours}h</span>
                                    </div>
                                    <div className="w-full bg-black/40 h-1.5 rounded-full overflow-hidden p-0.5">
                                        <div className="h-full bg-indigo-500 rounded-full" style={{ width: `${Math.min((hours / 40) * 100, 100)}%` }}/>
                                    </div>
                                </div>
                            </div>
                        ) : isCategory ? (
                            <div className="flex justify-between items-center text-left">
                                <div className="truncate">
                                    <div className="text-[11px] font-black uppercase leading-tight tracking-tight mb-1 truncate">{nodeData.title}</div>
                                    <div className="text-[9px] font-black opacity-30 uppercase tracking-widest leading-none">{hours} HRS TOTAL</div>
                                </div>
                                <div className={`p-1.5 rounded-lg transition-all ${isRelated ? 'bg-indigo-600 text-white' : 'bg-white/5 text-indigo-400'}`}>
                                    <Icon name="chevron" size={14}/>
                                </div>
                            </div>
                        ) : (
                            <div className="flex items-center gap-2.5 px-1">
                                <div className="p-1.5 bg-white/10 rounded-full text-indigo-400"><Icon name="clock" size={12}/></div>
                                <div className="truncate flex-1 text-left">
                                    <div className="text-[10px] font-bold truncate uppercase leading-none">{nodeData.title}</div>
                                    <div className="text-[8px] font-black text-indigo-300/80 mt-1 uppercase leading-none">{nodeData.hours} HRS/WK</div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative flex flex-col p-6 md:p-10" onClick={() => setSelectedNode(null)} onPointerMove={handlePointerMove} onPointerUp={() => setDraggingNode(null)}>
                    <header className="relative z-[200] flex flex-col lg:flex-row justify-between items-center gap-8 bg-slate-900/60 backdrop-blur-3xl border border-white/10 p-6 rounded-[2.5rem] shadow-2xl mb-12" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-8">
                            <div className="p-4 bg-indigo-600 rounded-[1.2rem] shadow-xl"><Icon name="shield" size={28} className="text-white"/></div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase leading-none mb-1 text-left">Strategic HR Map</h1>
                                <p className="text-[10px] font-bold opacity-40 uppercase tracking-[0.3em] text-left">Organization Architecture Audit</p>
                            </div>
                        </div>

                        {isAdmin && (
                            <div className="flex gap-2">
                                <button onClick={() => addNode('entity')} className="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5 flex items-center gap-2 transition-all"><Icon name="plus" size={10}/> Entity</button>
                                <button onClick={() => addNode('role')} className="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5 flex items-center gap-2 transition-all"><Icon name="plus" size={10}/> Role</button>
                                <button onClick={() => addNode('category')} className="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-white/5 flex items-center gap-2 transition-all"><Icon name="plus" size={10}/> Category</button>
                            </div>
                        )}

                        <div className="flex gap-2 bg-black/40 p-1.5 rounded-2xl border border-white/5">
                            {['admin', 'presentation', 'dashboard'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={`px-10 py-3 rounded-xl text-[10px] font-black transition-all tracking-widest ${viewMode === m ? 'bg-indigo-600 text-white shadow-xl scale-105' : 'text-slate-400 hover:text-white'}`}>{m.toUpperCase()}</button>
                            ))}
                        </div>
                    </header>

                    <div className="flex-1 relative bg-slate-900/10 rounded-[3.5rem] border border-white/10 overflow-hidden backdrop-blur-sm touch-none">
                        <div ref={containerRef} className="absolute inset-0 transition-transform duration-1000" style={{ transform: `scale(${zoomLevel})` }}>
                            {/* LEGEND MARKERS */}
                            <div className="pointer-events-none opacity-20 h-full w-full">
                                <div className="absolute top-0 left-[12%] h-full w-[1px] bg-indigo-500/20 flex flex-col justify-center items-center"><span className="text-[10px] font-black uppercase tracking-[0.5em] rotate-90 -translate-x-full whitespace-nowrap">Portfolio Entities</span></div>
                                <div className="absolute top-0 left-[38%] h-full w-[1px] bg-indigo-500/20 flex flex-col justify-center items-center"><span className="text-[10px] font-black uppercase tracking-[0.5em] rotate-90 -translate-x-full whitespace-nowrap">HR Team</span></div>
                                <div className="absolute top-0 left-[65%] h-full w-[1px] bg-indigo-500/20 flex flex-col justify-center items-center"><span className="text-[10px] font-black uppercase tracking-[0.5em] rotate-90 -translate-x-full whitespace-nowrap">Main Categories</span></div>
                                <div className="absolute top-0 left-[92%] h-full w-[1px] bg-indigo-500/20 flex flex-col justify-center items-center"><span className="text-[10px] font-black uppercase tracking-[0.5em] rotate-90 -translate-x-full whitespace-nowrap">Job Details</span></div>
                            </div>
                            
                            {/* CONNECTIONS: Entities to Roles */}
                            {Object.entries(data).filter(([k,v]) => v.type === 'role').map(([k, v]) => v.reportsTo?.map(ent => (
                                <Connection key={`${k}-${ent}`} start={coords[ent]} end={coords[k]} color="#6366F1" isReporting={true} active={activeNodeId === k || activeNodeId === ent} isFaint={activeNodeId && activeNodeId !== k && activeNodeId !== ent}/>
                            )))}

                            {/* CONNECTIONS: Roles to Categories */}
                            {Object.entries(data).filter(([k,v]) => v.type === 'category').map(([k, v]) => (
                                <Connection key={`${k}-cat`} start={coords[v.belongsTo]} end={coords[k]} color="#818CF8" active={activeNodeId === k || activeNodeId === v.belongsTo} pulsing={true}/>
                            ))}

                            {/* CONNECTIONS: Categories to Tasks */}
                            {Object.entries(data).filter(([k,v]) => v.type === 'task').map(([k, v]) => (
                                <Connection key={`${k}-task`} start={coords[v.belongsToCat]} end={coords[k]} color="#818CF8" active={activeNodeId === k || activeNodeId === v.belongsToCat} pulsing={true}/>
                            ))}

                            {/* NODES */}
                            {Object.keys(data).map(nodeKey => renderNode(nodeKey))}
                        </div>

                        <div className="absolute bottom-10 right-10 flex bg-black/80 backdrop-blur-xl border border-white/10 rounded-2xl p-2 z-[300] shadow-2xl scale-110" onClick={e => e.stopPropagation()}>
                            <button onClick={() => setZoomLevel(p => Math.max(0.4, p - 0.1))} className="p-3 text-slate-400 hover:text-white transition-all"><Icon name="zoomOut" size={20}/></button>
                            <div className="flex items-center px-4 text-xs font-black border-x border-white/10 w-16 justify-center tracking-tighter">{Math.round(zoomLevel * 100)}%</div>
                            <button onClick={() => setZoomLevel(p => Math.min(2, p + 0.1))} className="p-3 text-slate-400 hover:text-white transition-all"><Icon name="zoomIn" size={20}/></button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
