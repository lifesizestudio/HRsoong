<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic HR Architecture Map</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Transpilation in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: #e2e8f0; overflow-x: hidden; }
        @keyframes dash { to { stroke-dashoffset: -36; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }
        .touch-none { touch-action: none; }
        select { color-scheme: dark; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // --- INTERNAL SVG ICON COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m15-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                chart: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
                layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                unlock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                zoomIn: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></>,
                zoomOut: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const Connection = ({ start, end, color, pulsing, isReporting, isFaint, active }) => {
            if (!start || !end) return null;
            const isDownward = start.y <= end.y;
            const offsetY = 4;
            const sY = isDownward ? start.y + offsetY : start.y - offsetY;
            const eY = isDownward ? end.y - offsetY : end.y + offsetY;
            const midY = (sY + eY) / 2;
            const path = `M ${start.x} ${sY} C ${start.x} ${midY}, ${end.x} ${midY}, ${end.x} ${eY}`;
            const opacity = active ? 'opacity-100' : (isFaint ? 'opacity-[0.03]' : (isReporting ? 'opacity-10' : 'opacity-20'));
            const strokeWidth = active ? "0.5" : (isReporting ? "0.2" : "0.3");

            return (
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={isReporting ? "1 3" : "none"} className={`${opacity} transition-all duration-500 ease-in-out`}/>
                    {pulsing && active && <path d={path} fill="none" stroke={color} strokeWidth="0.6" strokeLinecap="round" strokeDasharray="6 12" className="animate-[dash_3s_linear_infinite] opacity-100"/>}
                </svg>
            );
        };

        function App() {
            const [showSolution, setShowSolution] = useState(false);
            const [viewMode, setViewMode] = useState('presentation');
            const [zoomLevel, setZoomLevel] = useState(1);
            const [hoveredNode, setHoveredNode] = useState(null);
            const [draggingNode, setDraggingNode] = useState(null);
            const containerRef = useRef(null);

            // GLOBAL STATE HELPERS
            const isAdmin = viewMode === 'admin';
            const isPresentation = viewMode === 'presentation';

            const [data, setData] = useState({
                ent_ceg: { type: 'entity', title: "CEG CORP", employeeCount: 30, region: 'Singapore' },
                ent_enr: { type: 'entity', title: "Enrichment", employeeCount: 125, region: 'Singapore', breakdown: { ft: 30, pt: 60, fl: 35 } },
                ent_hsk: { type: 'entity', title: "HSK", employeeCount: 10, region: 'Singapore' },
                ent_vn: { type: 'entity', title: "Vietnam", employeeCount: 100, region: 'Overseas' },
                ent_aus: { type: 'entity', title: "Australia", employeeCount: 0, region: 'Overseas' },
                ent_klc: { type: 'entity', title: "KLC", employeeCount: 100, region: 'Singapore' },
                ent_tgi: { type: 'entity', title: "TGI", employeeCount: 15, region: 'Singapore' },
                manager: { type: 'role', title: "HR Manager", subtitle: "Headcount 1.0", reportsTo: ['ent_ceg', 'ent_vn', 'ent_aus', 'ent_hsk', 'ent_enr'], isExpanded: true },
                payroll: { type: 'role', title: "Payroll Specialist", subtitle: "Headcount 1.0", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'], reportsToRole: 'manager', isExpanded: true },
                recruiter: { type: 'role', title: "HR Executive", subtitle: "Headcount 1.0", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk'], reportsToRole: 'manager', isExpanded: true },
                strategy: { type: 'task', title: "Strategic Leadership", hours: 15, frequency: 'Weekly', belongsTo: "manager", entity: "CEG CORP", theme: 'indigo' },
                payroll_ceg: { type: 'task', title: "Group Payroll Processing", hours: 20, frequency: 'Weekly', belongsTo: "payroll", entity: "CEG CORP", theme: 'emerald' },
                interviewing: { type: 'task', title: "HSK Talent Acquisition", hours: 40, frequency: 'Weekly', belongsTo: "recruiter", entity: "HSK", theme: 'indigo' }
            });

            const [coords, setCoords] = useState({
                ent_ceg: { x: 7, y: 12 }, ent_enr: { x: 19, y: 18 }, ent_hsk: { x: 31, y: 12 }, ent_klc: { x: 43, y: 18 }, ent_tgi: { x: 55, y: 12 }, ent_vn: { x: 78, y: 18 }, ent_aus: { x: 91, y: 12 },
                manager: { x: 30, y: 42 }, payroll: { x: 50, y: 65 }, recruiter: { x: 15, y: 65 },
                strategy: { x: 10, y: 85 }, payroll_ceg: { x: 75, y: 85 }, interviewing: { x: 5, y: 85 }
            });

            const getWeeklyHours = (hours, freq = 'Weekly') => {
                const h = Number(hours) || 0;
                return freq === 'Monthly' ? h / 4.33 : (freq === 'Yearly' ? h / 52 : h);
            };

            const totalLoad = useMemo(() => Object.values(data).filter(v => v.type === 'task').reduce((sum, v) => sum + getWeeklyHours(v.hours, v.frequency), 0), [data]);
            const totalCapacity = useMemo(() => Object.entries(data).filter(([k, v]) => v.type === 'role').reduce((sum, [k, v]) => sum + 40, 0), [data]);
            const utilizationRate = totalCapacity > 0 ? Math.round((totalLoad / totalCapacity) * 100) : 0;

            const handlePointerDown = (e, key) => { if (isAdmin) { e.stopPropagation(); setDraggingNode(key); } };
            const handlePointerMove = (e) => {
                if (!draggingNode || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
                const x = Math.max(0, Math.min(100, (mouseX / rect.width) * 100));
                const y = Math.max(0, Math.min(100, (mouseY / rect.height) * 100));
                setCoords(prev => ({ ...prev, [draggingNode]: { x, y } }));
            };

            const updateData = (key, field, value) => setData(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            const updateBreakdown = (key, field, value) => setData(prev => ({ ...prev, [key]: { ...prev[key], breakdown: { ...prev[key].breakdown, [field]: Number(value) } } }));

            const addEntity = () => {
                const id = `ent_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'entity', title: "New Entity", employeeCount: 0, region: 'Singapore' } }));
                setCoords(p => ({ ...p, [id]: { x: 50, y: 15 } }));
            };
            const addRole = () => {
                const id = `role_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'role', title: "New Role", subtitle: "Headcount 1.0", reportsTo: [] } }));
                setCoords(p => ({ ...p, [id]: { x: 50, y: 50 } }));
            };
            const addTask = () => {
                const id = `task_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'task', title: "New Task", hours: 10, frequency: 'Weekly', belongsTo: 'manager' } }));
                setCoords(p => ({ ...p, [id]: { x: 50, y: 85 } }));
            };
            const deleteNode = (key) => {
                const newData = { ...data }; delete newData[key]; setData(newData);
                const newCoords = { ...coords }; delete newCoords[key]; setCoords(newCoords);
            };

            const handleSnapToGrid = () => {
                const newCoords = { ...coords };
                const sg = ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'];
                const os = ['ent_vn', 'ent_aus'];
                sg.forEach((k, i) => { if(newCoords[k]) newCoords[k] = { x: (65 / 6) * (i + 1), y: i % 2 === 0 ? 12 : 18 }; });
                os.forEach((k, i) => { if(newCoords[k]) newCoords[k] = { x: 75 + (25 / 3) * (i + 1), y: i % 2 === 0 ? 18 : 12 }; });
                if(newCoords.manager) newCoords.manager = { x: 32, y: 42 };
                if(newCoords.payroll) newCoords.payroll = { x: 50, y: 65 };
                if(newCoords.recruiter) newCoords.recruiter = { x: 18, y: 65 };
                setCoords(newCoords);
            };

            const renderNode = (nodeKey, isVisible = true) => {
                const nodeData = data[nodeKey];
                const { x, y } = coords[nodeKey] || {x:50,y:50};
                const isEntity = nodeData.type === 'entity';
                const isRole = nodeData.type === 'role';
                const isTask = nodeData.type === 'task';
                const isFocused = hoveredNode === nodeKey;
                const isDimmed = isPresentation && hoveredNode && hoveredNode !== nodeKey;

                let displayHours = nodeData.hours || 0;
                const servingPopulation = isRole ? (nodeData.reportsTo || []).reduce((sum, entId) => sum + (data[entId]?.employeeCount || 0), 0) : 0;

                const themes = {
                    indigo: 'bg-indigo-950/60 border-indigo-500/50 text-indigo-100',
                    emerald: 'bg-emerald-950/60 border-emerald-500/50 text-emerald-100',
                    green: 'bg-green-900/80 border-green-400 text-white',
                    slate: 'bg-slate-800/80 border-slate-600/50 text-slate-100',
                    entity: 'bg-slate-900 border-white/10 text-white'
                };

                if (isTask && isPresentation && !isVisible) return null;

                return (
                    <div key={nodeKey} 
                        onPointerDown={(e) => handlePointerDown(e, nodeKey)} 
                        onMouseEnter={() => setHoveredNode(nodeKey)} 
                        onMouseLeave={() => setHoveredNode(null)}
                        className={`group absolute transform -translate-x-1/2 -translate-y-1/2 z-10 transition-all duration-500 backdrop-blur-md border 
                            ${isEntity ? themes.entity : (themes[nodeData.theme] || themes.slate)} 
                            ${isEntity ? 'w-52 py-3 rounded-xl' : (isRole ? 'w-56 p-4 rounded-2xl' : 'w-48 p-3 rounded-full')}
                            ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-90 pointer-events-none'}
                            ${isFocused ? 'ring-2 ring-indigo-400 shadow-2xl scale-105 z-40 !opacity-100' : ''}
                            ${isDimmed ? 'opacity-10 scale-95 saturate-0' : ''}
                            ${isAdmin ? 'cursor-grab hover:border-white/40' : 'cursor-default'}`}
                        style={{ left: `${x}%`, top: `${y}%` }}>
                        
                        {isAdmin && (
                            <button onClick={() => deleteNode(nodeKey)} className="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-50">
                                <Icon name="trash" size={12}/>
                            </button>
                        )}

                        {isEntity ? (
                            <div className="text-center flex flex-col items-center">
                                <div className="text-[9px] font-black uppercase opacity-30 mb-1 flex items-center gap-1">
                                    <Icon name="globe" size={10}/> 
                                    {isAdmin ? (
                                        <select value={nodeData.region} onChange={e => updateData(nodeKey, 'region', e.target.value)} className="bg-transparent border-none outline-none cursor-pointer">
                                            <option value="Singapore">Singapore</option>
                                            <option value="Overseas">Overseas</option>
                                        </select>
                                    ) : nodeData.region}
                                </div>
                                {isAdmin ? (
                                    <input type="text" value={nodeData.title} onChange={e => updateData(nodeKey, 'title', e.target.value)} className="w-full bg-transparent border-none outline-none text-center font-black text-xs uppercase" />
                                ) : (
                                    <div className="font-black text-xs uppercase tracking-wider">{nodeData.title}</div>
                                )}
                                <div className="mt-1 flex items-center justify-center gap-1 bg-white/5 rounded-full px-2 py-0.5">
                                    <Icon name="users" size={10} className="text-white/40"/> 
                                    {isAdmin ? (
                                        <input type="number" value={nodeData.employeeCount} onChange={e => updateData(nodeKey, 'employeeCount', Number(e.target.value))} className="w-8 bg-transparent border-none outline-none text-[10px] font-bold text-center" />
                                    ) : (
                                        <span className="text-[10px] font-bold">{nodeData.employeeCount}</span>
                                    )}
                                </div>
                                {nodeData.breakdown && (
                                    <div className="mt-2 w-full bg-black/40 rounded-lg p-1.5 border border-white/5 space-y-0.5 text-[8px] font-bold">
                                        {['ft', 'pt', 'fl'].map(f => (
                                            <div key={f} className="flex justify-between uppercase">
                                                <span className="opacity-40">{f}</span>
                                                {isAdmin ? (
                                                    <input type="number" value={nodeData.breakdown[f]} onChange={e => updateBreakdown(nodeKey, f, e.target.value)} className="w-6 bg-transparent border-none outline-none text-right" />
                                                ) : (
                                                    <span className={f === 'ft' ? 'text-emerald-400' : (f === 'pt' ? 'text-sky-400' : 'text-amber-400')}>{nodeData.breakdown[f]}</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : isRole ? (
                            <div>
                                <div className="flex justify-between items-start mb-2">
                                    {isAdmin ? (
                                        <input type="text" value={nodeData.subtitle} onChange={e => updateData(nodeKey, 'subtitle', e.target.value)} className="w-24 bg-transparent border-none outline-none text-[10px] font-black uppercase opacity-40" />
                                    ) : (
                                        <div className="text-[10px] font-black uppercase tracking-widest opacity-40">{nodeData.subtitle}</div>
                                    )}
                                    <div className="text-[10px] font-bold text-indigo-400 flex items-center gap-1 bg-indigo-500/10 px-2 py-0.5 rounded-full border border-indigo-500/20"><Icon name="users" size={10}/> {servingPopulation}</div>
                                </div>
                                {isAdmin ? (
                                    <input type="text" value={nodeData.title} onChange={e => updateData(nodeKey, 'title', e.target.value)} className="w-full bg-transparent border-none outline-none font-black text-base leading-tight mb-4" />
                                ) : (
                                    <div className="font-black text-base leading-tight mb-4">{nodeData.title}</div>
                                )}
                                <div className="w-full bg-black/30 h-1.5 rounded-full overflow-hidden mb-1">
                                    <div className="h-full bg-indigo-500" style={{ width: `${Math.min((displayHours/40)*100, 100)}%` }} />
                                </div>
                                <div className="flex justify-between text-[9px] font-bold opacity-40"><span>UTILIZATION</span><span>{Math.round((displayHours/40)*100)}%</span></div>
                                {isAdmin && (
                                    <div className="mt-3 pt-3 border-t border-white/5 space-y-2">
                                        <label className="text-[8px] uppercase font-black opacity-30">Supports</label>
                                        <select multiple value={nodeData.reportsTo || []} onChange={e => updateData(nodeKey, 'reportsTo', Array.from(e.target.selectedOptions, o => o.value))} className="w-full bg-black/50 text-[10px] rounded p-1 h-12">
                                            {Object.entries(data).filter(([k,v]) => v.type === 'entity').map(([k,v]) => <option key={k} value={k}>{v.title}</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="flex items-center gap-2">
                                <div className="p-1.5 bg-black/20 rounded-full text-indigo-400"><Icon name="zap" size={14}/></div>
                                <div className="truncate flex-1">
                                    {isAdmin ? (
                                        <input type="text" value={nodeData.title} onChange={e => updateData(nodeKey, 'title', e.target.value)} className="w-full bg-transparent border-none outline-none text-[10px] font-bold truncate" />
                                    ) : (
                                        <div className="text-[10px] font-bold truncate leading-none">{nodeData.title}</div>
                                    )}
                                    {isAdmin && (
                                        <div className="flex items-center gap-1 mt-1">
                                            <input type="number" value={nodeData.hours} onChange={e => updateData(nodeKey, 'hours', Number(e.target.value))} className="w-6 bg-black/20 text-[8px] rounded px-0.5" />
                                            <select value={nodeData.belongsTo} onChange={e => updateData(nodeKey, 'belongsTo', e.target.value)} className="bg-black/20 text-[8px] rounded flex-1">
                                                {Object.entries(data).filter(([k,v]) => v.type === 'role').map(([k,v]) => <option key={k} value={k}>{v.title}</option>)}
                                            </select>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative flex flex-col p-4 md:p-8" onPointerMove={handlePointerMove} onPointerUp={() => setDraggingNode(null)}>
                    <header className="relative z-50 flex flex-col lg:flex-row justify-between items-center gap-6 bg-slate-900/40 backdrop-blur-2xl border border-white/5 p-6 rounded-[2rem] shadow-2xl mb-8">
                        <div className="flex items-center gap-5">
                            <div className="p-4 bg-indigo-600 rounded-3xl"><Icon name="shield" size={28} className="text-white"/></div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase">HR Architecture Map</h1>
                                {isAdmin && (
                                    <div className="flex gap-2 mt-1">
                                        <button onClick={addEntity} className="text-[9px] font-black bg-white/5 hover:bg-white/10 px-2 py-1 rounded flex items-center gap-1 border border-white/5 uppercase transition-all"><Icon name="plus" size={10}/> Entity</button>
                                        <button onClick={addRole} className="text-[9px] font-black bg-white/5 hover:bg-white/10 px-2 py-1 rounded flex items-center gap-1 border border-white/5 uppercase transition-all"><Icon name="plus" size={10}/> Role</button>
                                        <button onClick={addTask} className="text-[9px] font-black bg-white/5 hover:bg-white/10 px-2 py-1 rounded flex items-center gap-1 border border-white/5 uppercase transition-all"><Icon name="plus" size={10}/> Task</button>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-2 bg-black/40 p-1 rounded-2xl border border-white/5">
                            {['admin', 'presentation', 'dashboard'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={`px-5 py-2.5 rounded-xl text-xs font-black transition-all ${viewMode === m ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>{m.toUpperCase()}</button>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleSnapToGrid} className="px-6 py-3 bg-slate-800/80 hover:bg-slate-700 rounded-2xl text-[10px] font-black border border-white/5 transition-all flex items-center gap-2 uppercase tracking-widest"><Icon name="layout" size={14}/> Auto-Grid</button>
                        </div>
                    </header>

                    {viewMode === 'dashboard' ? (
                        <div className="flex-1 bg-slate-900/20 rounded-[3rem] border border-white/5 p-8 overflow-y-auto custom-scrollbar">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 max-w-6xl mx-auto">
                                <div className="bg-black/30 p-6 rounded-[2rem] border border-white/5 text-center">
                                    <div className="text-[10px] font-black opacity-40 mb-2 uppercase tracking-widest">System Load</div>
                                    <div className="text-4xl font-black">{totalLoad.toFixed(1)}h</div>
                                </div>
                                <div className="bg-black/30 p-6 rounded-[2rem] border border-white/5 text-center">
                                    <div className="text-[10px] font-black opacity-40 mb-2 uppercase tracking-widest">Utilization</div>
                                    <div className={`text-4xl font-black ${utilizationRate > 100 ? 'text-red-400' : 'text-emerald-400'}`}>{utilizationRate}%</div>
                                </div>
                                <div className="bg-black/30 p-6 rounded-[2rem] border border-white/5 text-center">
                                    <div className="text-[10px] font-black opacity-40 mb-2 uppercase tracking-widest">Total Staff</div>
                                    <div className="text-4xl font-black text-indigo-400">{Object.values(data).filter(v => v.type === 'entity').reduce((s,v) => s + (v.employeeCount || 0), 0)}</div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 relative bg-slate-900/10 rounded-[3rem] border border-white/5 overflow-hidden backdrop-blur-sm touch-none">
                            <div ref={containerRef} className="absolute inset-0 transition-transform duration-700" style={{ transform: `scale(${zoomLevel})` }}>
                                {isPresentation && (
                                    <div className="pointer-events-none opacity-30">
                                        <div className="absolute top-[15%] left-10 w-full flex items-center gap-4"><span className="text-[11px] font-black uppercase tracking-[0.4em]">Entities</span><div className="h-[1px] flex-1 bg-white/[0.05]"/></div>
                                        <div className="absolute top-[42%] left-10 w-full flex items-center gap-4"><span className="text-[11px] font-black uppercase tracking-[0.4em]">Management</span><div className="h-[1px] flex-1 bg-white/[0.05]"/></div>
                                        <div className="absolute top-[65%] left-10 w-full flex items-center gap-4"><span className="text-[11px] font-black uppercase tracking-[0.4em]">Execution</span><div className="h-[1px] flex-1 bg-white/[0.05]"/></div>
                                    </div>
                                )}
                                
                                {Object.entries(data).map(([key, nodeData]) => {
                                    if (nodeData.type !== 'role') return null;
                                    return (nodeData.reportsTo || []).map(entKey => (
                                        <Connection key={`e-${key}-${entKey}`} start={coords[entKey]} end={coords[key]} color="#94A3B8" isReporting={true} active={hoveredNode === key || hoveredNode === entKey} isFaint={isPresentation && hoveredNode && hoveredNode !== key && hoveredNode !== entKey}/>
                                    ));
                                })}

                                {Object.entries(data).map(([key, nodeData]) => {
                                    if (nodeData.type !== 'task') return null;
                                    return <Connection key={`t-${key}`} start={coords[nodeData.belongsTo]} end={coords[key]} color="#6366F1" pulsing={true} active={hoveredNode === key || hoveredNode === nodeData.belongsTo} isFaint={isPresentation && hoveredNode && hoveredNode !== key && hoveredNode !== nodeData.belongsTo}/>
                                })}
                                
                                {Object.entries(data).map(([key, nodeData]) => {
                                    let nodeVisible = true;
                                    if(nodeData.type === 'task' && isPresentation) {
                                        nodeVisible = (hoveredNode === key || hoveredNode === nodeData.belongsTo);
                                    }
                                    return renderNode(key, nodeVisible);
                                })}
                            </div>
                            
                            <div className="absolute bottom-10 left-10 flex bg-black/80 backdrop-blur-xl border border-white/10 rounded-2xl p-1 z-50">
                                <button onClick={() => setZoomLevel(p => Math.max(0.4, p-0.1))} className="p-3 hover:text-white transition-colors"><Icon name="zoomOut" size={20}/></button>
                                <div className="flex items-center px-4 text-xs font-black border-x border-white/5">{Math.round(zoomLevel * 100)}%</div>
                                <button onClick={() => setZoomLevel(p => Math.min(2, p+0.1))} className="p-3 hover:text-white transition-colors"><Icon name="zoomIn" size={20}/></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
