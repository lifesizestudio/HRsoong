<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic HR Architecture Map - Position Sequence</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Transpilation in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: #e2e8f0; overflow-x: hidden; }
        @keyframes dash { to { stroke-dashoffset: -36; } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.1); }
        .touch-none { touch-action: none; }
        select { color-scheme: dark; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // --- INTERNAL SVG ICON COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m15-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                zap: <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                layout: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                zoomIn: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></>,
                zoomOut: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const Connection = ({ start, end, color, pulsing, isReporting, isFaint, active }) => {
            if (!start || !end) return null;
            const midX = (start.x + end.x) / 2;
            const path = `M ${start.x} ${start.y} C ${midX} ${start.y}, ${midX} ${end.y}, ${end.x} ${end.y}`;
            const opacity = active ? 'opacity-100' : (isFaint ? 'opacity-[0.03]' : (isReporting ? 'opacity-10' : 'opacity-20'));
            const strokeWidth = active ? "0.8" : (isReporting ? "0.3" : "0.4");

            return (
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={isReporting ? "1 3" : "none"} className={`${opacity} transition-all duration-500 ease-in-out`}/>
                    {pulsing && active && <path d={path} fill="none" stroke={color} strokeWidth="1" strokeLinecap="round" strokeDasharray="6 12" className="animate-[dash_3s_linear_infinite] opacity-100"/>}
                </svg>
            );
        };

        function App() {
            const [viewMode, setViewMode] = useState('presentation');
            const [zoomLevel, setZoomLevel] = useState(1);
            const [hoveredNode, setHoveredNode] = useState(null);
            const [draggingNode, setDraggingNode] = useState(null);
            const containerRef = useRef(null);

            const isAdmin = viewMode === 'admin';
            const isPresentation = viewMode === 'presentation';

            const [data, setData] = useState({
                ent_ceg: { type: 'entity', title: "CEG CORP", employeeCount: 30, region: 'Singapore' },
                ent_enr: { type: 'entity', title: "Enrichment", employeeCount: 125, region: 'Singapore', breakdown: { ft: 30, pt: 60, fl: 35 } },
                ent_hsk: { type: 'entity', title: "HSK", employeeCount: 10, region: 'Singapore' },
                ent_klc: { type: 'entity', title: "KLC", employeeCount: 100, region: 'Singapore' },
                ent_tgi: { type: 'entity', title: "TGI", employeeCount: 15, region: 'Singapore' },
                ent_vn: { type: 'entity', title: "Vietnam", employeeCount: 100, region: 'Overseas' },
                ent_aus: { type: 'entity', title: "Australia", employeeCount: 0, region: 'Overseas' },
                
                manager: { type: 'role', title: "HR Manager", subtitle: "Lead", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_vn', 'ent_aus'] },
                recruiter: { type: 'role', title: "HR Executive", subtitle: "Execution", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk'], reportsToRole: 'manager' },
                payroll: { type: 'role', title: "Payroll Specialist", subtitle: "Support", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'], reportsToRole: 'manager' },
                
                strategy: { type: 'task', title: "Strategic Leadership", hours: 15, belongsTo: "manager", theme: 'indigo' },
                payroll_ceg: { type: 'task', title: "Group Payroll", hours: 20, belongsTo: "payroll", theme: 'emerald' },
                ops_enr: { type: 'task', title: "Enrichment Ops", hours: 20, belongsTo: "payroll", theme: 'slate' },
                interviewing: { type: 'task', title: "HSK Recruitment", hours: 40, belongsTo: "recruiter", theme: 'indigo' }
            });

            // Sequence Entity: CEG, Enrichment, HSK, KLC, TGI, VN, AUS
            // Sequence Positions: Manager, Executive (Recruiter), Payroll
            const [coords, setCoords] = useState({
                ent_ceg: { x: 15, y: 12 }, 
                ent_enr: { x: 15, y: 24 }, 
                ent_hsk: { x: 15, y: 36 }, 
                ent_klc: { x: 15, y: 48 }, 
                ent_tgi: { x: 15, y: 60 }, 
                ent_vn: { x: 15, y: 72 }, 
                ent_aus: { x: 15, y: 84 },
                manager: { x: 50, y: 25 }, 
                recruiter: { x: 50, y: 50 }, 
                payroll: { x: 50, y: 75 },
                strategy: { x: 85, y: 20 }, 
                payroll_ceg: { x: 85, y: 40 }, 
                ops_enr: { x: 85, y: 60 }, 
                interviewing: { x: 85, y: 80 }
            });

            const getWeeklyHours = (hours) => Number(hours) || 0;
            const totalLoad = useMemo(() => Object.values(data).filter(v => v.type === 'task').reduce((sum, v) => sum + getWeeklyHours(v.hours), 0), [data]);
            const totalCapacity = useMemo(() => Object.entries(data).filter(([k, v]) => v.type === 'role').reduce((sum, [k, v]) => sum + 40, 0), [data]);
            const utilizationRate = totalCapacity > 0 ? Math.round((totalLoad / totalCapacity) * 100) : 0;

            const handlePointerDown = (e, key) => { if (isAdmin) { e.stopPropagation(); setDraggingNode(key); } };
            const handlePointerMove = (e) => {
                if (!draggingNode || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
                const x = Math.max(0, Math.min(100, (mouseX / rect.width) * 100));
                const y = Math.max(0, Math.min(100, (mouseY / rect.height) * 100));
                setCoords(prev => ({ ...prev, [draggingNode]: { x, y } }));
            };

            const updateData = (key, field, value) => setData(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            const updateBreakdown = (key, field, value) => setData(prev => ({ ...prev, [key]: { ...prev[key], breakdown: { ...prev[key].breakdown, [field]: Number(value) } } }));

            const addEntity = () => {
                const id = `ent_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'entity', title: "New Entity", employeeCount: 0, region: 'Singapore' } }));
                setCoords(p => ({ ...p, [id]: { x: 15, y: 50 } }));
            };
            const addRole = () => {
                const id = `role_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'role', title: "New Role", subtitle: "Staff 1.0", reportsTo: [] } }));
                setCoords(p => ({ ...p, [id]: { x: 50, y: 50 } }));
            };
            const addTask = () => {
                const id = `task_${Date.now()}`;
                setData(p => ({ ...p, [id]: { type: 'task', title: "New Task", hours: 10, belongsTo: 'manager' } }));
                setCoords(p => ({ ...p, [id]: { x: 85, y: 50 } }));
            };
            const deleteNode = (key) => {
                const newData = { ...data }; delete newData[key]; setData(newData);
                const newCoords = { ...coords }; delete newCoords[key]; setCoords(newCoords);
            };

            const handleSnapToGrid = () => {
                const newCoords = { ...coords };
                
                // ORDER: Entities
                const entityOrder = ['CEG CORP', 'Enrichment', 'HSK', 'KLC', 'TGI', 'Vietnam', 'Australia'];
                const entities = Object.entries(data)
                    .filter(([k,v]) => v.type === 'entity')
                    .sort((a,b) => {
                        const idxA = entityOrder.indexOf(a[1].title);
                        const idxB = entityOrder.indexOf(b[1].title);
                        return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
                    });

                // ORDER: Positions (requested sequence)
                const roleOrder = ['manager', 'recruiter', 'payroll'];
                const roles = Object.entries(data)
                    .filter(([k,v]) => v.type === 'role')
                    .sort((a,b) => {
                        const idxA = roleOrder.indexOf(a[0]);
                        const idxB = roleOrder.indexOf(b[0]);
                        return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
                    });

                const tasks = Object.entries(data).filter(([k,v]) => v.type === 'task');

                entities.forEach(([k,v], i) => { newCoords[k] = { x: 15, y: (100 / (entities.length + 1)) * (i + 1) }; });
                roles.forEach(([k,v], i) => { newCoords[k] = { x: 50, y: (100 / (roles.length + 1)) * (i + 1) }; });
                tasks.forEach(([k,v], i) => { newCoords[k] = { x: 85, y: (100 / (tasks.length + 1)) * (i + 1) }; });
                setCoords(newCoords);
            };

            const renderNode = (nodeKey, isVisible = true) => {
                const nodeData = data[nodeKey];
                const { x, y } = coords[nodeKey] || {x:50,y:50};
                const isEntity = nodeData.type === 'entity';
                const isRole = nodeData.type === 'role';
                const isTask = nodeData.type === 'task';
                const isFocused = hoveredNode === nodeKey;
                const isDimmed = isPresentation && hoveredNode && hoveredNode !== nodeKey;

                let displayHours = nodeData.hours || 0;
                const servingPopulation = isRole ? (nodeData.reportsTo || []).reduce((sum, entId) => sum + (data[entId]?.employeeCount || 0), 0) : 0;

                const themes = {
                    indigo: 'bg-indigo-950/60 border-indigo-500/50 text-indigo-100',
                    emerald: 'bg-emerald-950/60 border-emerald-500/50 text-emerald-100',
                    green: 'bg-green-900/80 border-green-400 text-white',
                    slate: 'bg-slate-800/80 border-slate-600/50 text-slate-100',
                    entity: 'bg-slate-900 border-white/10 text-white shadow-lg'
                };

                if (isTask && isPresentation && !isVisible) return null;

                return (
                    <div key={nodeKey} 
                        onPointerDown={(e) => handlePointerDown(e, nodeKey)} 
                        onMouseEnter={() => setHoveredNode(nodeKey)} 
                        onMouseLeave={() => setHoveredNode(null)}
                        className={`group absolute transform -translate-x-1/2 -translate-y-1/2 z-10 transition-all duration-500 backdrop-blur-md border 
                            ${isEntity ? themes.entity : (themes[nodeData.theme] || themes.slate)} 
                            ${isEntity ? 'w-56 py-5 px-6 rounded-xl' : (isRole ? 'w-64 p-6 rounded-2xl' : 'w-52 p-4 rounded-full')}
                            ${isVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-90 pointer-events-none'}
                            ${isFocused ? 'ring-2 ring-indigo-400 shadow-2xl scale-105 z-40 !opacity-100 border-indigo-400' : ''}
                            ${isDimmed ? 'opacity-10 scale-95 saturate-0' : ''}
                            ${isAdmin ? 'cursor-grab hover:border-white/40 shadow-xl' : 'cursor-default'}`}
                        style={{ left: `${x}%`, top: `${y}%` }}>
                        
                        {isAdmin && (
                            <button onClick={(e) => { e.stopPropagation(); deleteNode(nodeKey); }} className="absolute -top-3 -right-3 bg-red-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-50 shadow-md">
                                <Icon name="trash" size={16}/>
                            </button>
                        )}

                        {isEntity ? (
                            <div className="text-center flex flex-col items-center">
                                <div className="text-[12px] font-black uppercase opacity-40 mb-2 flex items-center gap-2">
                                    <Icon name="globe" size={14}/> 
                                    {isAdmin ? (
                                        <select value={nodeData.region} onChange={e => updateData(nodeKey, 'region', e.target.value)} className="bg-transparent border-none outline-none cursor-pointer">
                                            <option value="Singapore">Singapore</option>
                                            <option value="Overseas">Overseas</option>
                                        </select>
                                    ) : nodeData.region}
                                </div>
                                {isAdmin ? (
                                    <input type="text" value={nodeData.title} onChange={e => updateData(nodeKey, 'title', e.target.value)} className="w-full bg-transparent border-none outline-none text-center font-black text-base uppercase tracking-wide" />
                                ) : (
                                    <div className="font-black text-base uppercase tracking-wider">{nodeData.title}</div>
                                )}
                                <div className="mt-2.5 flex items-center justify-center gap-2 bg-white/5 rounded-full px-4 py-1.5">
                                    <Icon name="users" size={14} className="text-white/40"/> 
                                    {isAdmin ? (
                                        <input type="number" value={nodeData.employeeCount} onChange={e => updateData(nodeKey, 'employeeCount', Number(e.target.value))} className="w-12 bg-transparent border-none outline-none text-sm font-bold text-center" />
                                    ) : (
                                        <span className="text-sm font-bold">{nodeData.employeeCount}</span>
                                    )}
                                </div>
                                {nodeData.breakdown && isFocused && (
                                    <div className="mt-4 w-full bg-black/40 rounded-lg p-3.5 border border-white/5 space-y-2 text-[11px] font-bold animate-in fade-in slide-in-from-top-1 duration-300">
                                        <div className="flex justify-between uppercase"><span className="opacity-40">Full Time</span><span className="text-emerald-400">{nodeData.breakdown.ft}</span></div>
                                        <div className="flex justify-between uppercase"><span className="opacity-40">Part Time</span><span className="text-sky-400">{nodeData.breakdown.pt}</span></div>
                                        <div className="flex justify-between uppercase"><span className="opacity-40">Freelancer</span><span className="text-amber-400">{nodeData.breakdown.fl}</span></div>
                                    </div>
                                )}
                            </div>
                        ) : isRole ? (
                            <div>
                                <div className="flex justify-between items-start mb-4">
                                    {isAdmin ? (
                                        <input type="text" value={nodeData.subtitle} onChange={e => updateData(nodeKey, 'subtitle', e.target.value)} className="w-32 bg-transparent border-none outline-none text-xs font-black uppercase opacity-40" />
                                    ) : (
                                        <div className="text-xs font-black uppercase tracking-widest opacity-40">{nodeData.subtitle}</div>
                                    )}
                                    <div className="text-xs font-bold text-indigo-400 flex items-center gap-1.5 bg-indigo-500/10 px-3.5 py-1.5 rounded-full border border-indigo-500/20"><Icon name="users" size={14}/> {servingPopulation}</div>
                                </div>
                                {isAdmin ? (
                                    <input type="text" value={nodeData.title} onChange={e => updateData(nodeKey, 'title', e.target.value)} className="w-full bg-transparent border-none outline-none font-black text-xl leading-tight mb-6" />
                                ) : (
                                    <div className="font-black text-xl leading-tight mb-6">{nodeData.title}</div>
                                )}
                                <div className="w-full bg-black/30 h-2.5 rounded-full overflow-hidden mb-2">
                                    <div className="h-full bg-indigo-500" style={{ width: `${Math.min((displayHours/40)*100, 100)}%` }} />
                                </div>
                                <div className="flex justify-between text-[12px] font-bold opacity-40 uppercase tracking-tighter"><span>UTILIZATION</span><span>{Math.round((displayHours/40)*100)}%</span></div>
                            </div>
                        ) : (
                            <div className="flex items-center gap-4">
                                <div className="p-2.5 bg-black/20 rounded-full text-indigo-400 shadow-inner"><Icon name="zap" size={20}/></div>
                                <div className="truncate flex-1 text-sm font-bold tracking-tight">{nodeData.title}</div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative flex flex-col p-8 md:p-12" onPointerMove={handlePointerMove} onPointerUp={() => setDraggingNode(null)}>
                    <header className="relative z-50 flex flex-col lg:flex-row justify-between items-center gap-10 bg-slate-900/40 backdrop-blur-2xl border border-white/5 p-10 rounded-[3rem] shadow-2xl mb-12">
                        <div className="flex items-center gap-8">
                            <div className="p-6 bg-indigo-600 rounded-3xl shadow-lg"><Icon name="shield" size={36} className="text-white"/></div>
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter uppercase leading-none mb-3">HR Architecture Map</h1>
                                {isAdmin && (
                                    <div className="flex gap-4 mt-3">
                                        <button onClick={addEntity} className="text-[12px] font-black bg-white/5 hover:bg-white/10 px-4 py-2 rounded flex items-center gap-2 border border-white/5 uppercase tracking-wider"><Icon name="plus" size={14}/> Entity</button>
                                        <button onClick={addRole} className="text-[12px] font-black bg-white/5 hover:bg-white/10 px-4 py-2 rounded flex items-center gap-2 border border-white/5 uppercase transition-all tracking-wider"><Icon name="plus" size={14}/> Role</button>
                                        <button onClick={addTask} className="text-[12px] font-black bg-white/5 hover:bg-white/10 px-4 py-2 rounded flex items-center gap-2 border border-white/5 uppercase transition-all tracking-wider"><Icon name="plus" size={14}/> Task</button>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex gap-3 bg-black/40 p-2 rounded-2xl border border-white/5">
                            {['admin', 'presentation', 'dashboard'].map(m => (
                                <button key={m} onClick={() => setViewMode(m)} className={`px-8 py-4 rounded-xl text-sm font-black transition-all tracking-widest ${viewMode === m ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>{m.toUpperCase()}</button>
                            ))}
                        </div>
                        <div className="flex gap-4">
                            <button onClick={handleSnapToGrid} className="px-10 py-5 bg-slate-800/80 hover:bg-slate-700 rounded-2xl text-sm font-black border border-white/5 transition-all flex items-center gap-3 uppercase tracking-[0.2em] shadow-lg"><Icon name="layout" size={20}/> Clean Grid</button>
                        </div>
                    </header>

                    {viewMode === 'dashboard' ? (
                        <div className="flex-1 bg-slate-900/20 rounded-[4rem] border border-white/5 p-16 overflow-y-auto custom-scrollbar">
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-12 max-w-7xl mx-auto">
                                <div className="bg-black/30 p-12 rounded-[3rem] border border-white/5 text-center shadow-xl">
                                    <div className="text-sm font-black opacity-40 mb-6 uppercase tracking-[0.3em]">System Load</div>
                                    <div className="text-7xl font-black">{totalLoad.toFixed(1)}<span className="text-3xl font-black opacity-20 ml-3">H</span></div>
                                </div>
                                <div className="bg-black/30 p-12 rounded-[3rem] border border-white/5 text-center shadow-xl">
                                    <div className="text-sm font-black opacity-40 mb-6 uppercase tracking-[0.3em]">Utilization</div>
                                    <div className={`text-7xl font-black ${utilizationRate > 100 ? 'text-red-400' : 'text-emerald-400'}`}>{utilizationRate}<span className="text-3xl font-black opacity-20 ml-2">%</span></div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 relative bg-slate-900/10 rounded-[4rem] border border-white/5 overflow-hidden backdrop-blur-sm touch-none">
                            <div ref={containerRef} className="absolute inset-0 transition-transform duration-700" style={{ transform: `scale(${zoomLevel})` }}>
                                {isPresentation && (
                                    <div className="pointer-events-none opacity-20">
                                        <div className="absolute top-0 left-[15%] h-full w-[1px] bg-white/[0.2] flex flex-col justify-center items-center"><span className="text-[14px] font-black uppercase tracking-[0.8em] rotate-90 -translate-x-full">Entities (Clients)</span></div>
                                        <div className="absolute top-0 left-[50%] h-full w-[1px] bg-white/[0.2] flex flex-col justify-center items-center"><span className="text-[14px] font-black uppercase tracking-[0.8em] rotate-90 -translate-x-full">HR Roles (Team)</span></div>
                                        <div className="absolute top-0 left-[85%] h-full w-[1px] bg-white/[0.2] flex flex-col justify-center items-center"><span className="text-[14px] font-black uppercase tracking-[0.8em] rotate-90 -translate-x-full">Deliverables (Tasks)</span></div>
                                    </div>
                                )}
                                
                                {Object.entries(data).map(([key, nodeData]) => {
                                    if (nodeData.type !== 'role') return null;
                                    return (nodeData.reportsTo || []).map(entKey => (
                                        <Connection key={`e-${key}-${entKey}`} start={coords[entKey]} end={coords[key]} color="#94A3B8" isReporting={true} active={hoveredNode === key || hoveredNode === entKey} isFaint={isPresentation && hoveredNode && hoveredNode !== key && hoveredNode !== entKey}/>
                                    ));
                                })}

                                {Object.entries(data).map(([key, nodeData]) => {
                                    if (nodeData.type !== 'task') return null;
                                    return <Connection key={`t-${key}`} start={coords[nodeData.belongsTo]} end={coords[key]} color="#6366F1" pulsing={true} active={hoveredNode === key || hoveredNode === nodeData.belongsTo} isFaint={isPresentation && hoveredNode && hoveredNode !== key && hoveredNode !== nodeData.belongsTo}/>
                                })}
                                
                                {Object.entries(data).map(([key, nodeData]) => {
                                    let nodeVisible = true;
                                    if(nodeData.type === 'task' && isPresentation) {
                                        nodeVisible = (hoveredNode === key || hoveredNode === nodeData.belongsTo);
                                    }
                                    return renderNode(key, nodeVisible);
                                })}
                            </div>
                            
                            <div className="absolute bottom-12 right-12 flex bg-black/80 backdrop-blur-xl border border-white/10 rounded-2xl p-2 z-[60] shadow-2xl">
                                <button onClick={() => setZoomLevel(p => Math.max(0.4, p-0.1))} className="p-4 text-slate-400 hover:text-white transition-colors" title="Zoom Out"><Icon name="zoomOut" size={28}/></button>
                                <div className="flex items-center px-6 text-base font-black border-x border-white/10">{Math.round(zoomLevel * 100)}%</div>
                                <button onClick={() => setZoomLevel(p => Math.min(2, p+0.1))} className="p-4 text-slate-400 hover:text-white transition-colors" title="Zoom In"><Icon name="zoomIn" size={28}/></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
