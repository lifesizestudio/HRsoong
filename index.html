<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic HR Synergy Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            overflow: hidden; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.03) 0px, transparent 50%);
        }
        
        .node-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .active-glow {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            z-index: 200 !important;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes signalFlow {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }

        .animate-signal {
            stroke-dasharray: 4, 12; 
            animation: signalFlow 1.5s linear infinite;
        }

        .admin-input {
            background: transparent;
            border: 1px dashed transparent;
            padding: 2px 4px;
            border-radius: 4px;
            width: 100%;
            transition: all 0.2s;
        }
        .admin-input:hover {
            border-color: #cbd5e1;
            background: rgba(0,0,0,0.02);
        }
        .admin-input:focus {
            outline: none;
            border-color: #6366f1;
            border-style: solid;
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .pro-card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02), 0 4px 6px -2px rgba(0, 0, 0, 0.01);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m15-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                refresh: <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>,
                chevron: <polyline points="9 18 15 12 9 6" />,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                activity: <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const Connection = ({ start, end, color, active, isFaint, isReporting, pulsing }) => {
            if (!start || !end) return null;
            const midY = (start.y + end.y) / 2;
            const path = `M ${start.x} ${start.y} C ${start.x} ${midY}, ${end.x} ${midY}, ${end.x} ${end.y}`;
            const opacity = active ? 'opacity-100' : (isFaint ? 'opacity-[0.03]' : (isReporting ? 'opacity-10' : 'opacity-20'));
            
            return (
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible" viewBox="0 0 2400 3000" preserveAspectRatio="none">
                    <path 
                        d={path} 
                        fill="none" 
                        stroke={color} 
                        strokeWidth={active ? "4" : "0.5"} 
                        strokeLinecap="round" 
                        strokeDasharray={isReporting && !active ? "2 3" : "none"}
                        className={`${opacity} transition-all duration-700 ease-in-out ${pulsing && active ? 'animate-signal' : ''}`}
                    />
                </svg>
            );
        };

        function App() {
            const [viewMode, setViewMode] = useState('presentation');
            const [zoomLevel, setZoomLevel] = useState(0.4); // Updated to 40%
            const [offset, setOffset] = useState({ x: 150, y: 50 });
            const [hoveredNode, setHoveredNode] = useState(null);
            const [selectedNode, setSelectedNode] = useState(null);
            const [isPanning, setIsPanning] = useState(false);
            const [lastMousePos, setLastMousePos] = useState({ x: 0, y: 0 });
            const containerRef = useRef(null);

            const activeNodeId = selectedNode || hoveredNode;
            const isIssues = viewMode === 'current_situation'; 
            const isAdmin = viewMode === 'admin';

            // --- DATASET ---
            const [data, setData] = useState({
                ent_ceg: { type: 'entity', title: "CEG CORP", employeeCount: 30, region: 'Singapore' },
                ent_enr: { type: 'entity', title: "Enrichment", employeeCount: 125, region: 'Singapore' },
                ent_hsk: { type: 'entity', title: "HSK", employeeCount: 10, region: 'Singapore' },
                ent_klc: { type: 'entity', title: "KLC", employeeCount: 100, region: 'Singapore' },
                ent_tgi: { type: 'entity', title: "TGI", employeeCount: 15, region: 'Singapore' },
                ent_vn: { type: 'entity', title: "Vietnam", employeeCount: 100, region: 'Overseas' },
                ent_aus: { type: 'entity', title: "Australia", employeeCount: 0, region: 'Overseas' },
                
                manager: { type: 'role', title: "HR Manager", subtitle: "Lead Strategy", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_vn', 'ent_aus'] },
                recruiter: { type: 'role', title: "HR Executive", subtitle: "Lead Execution", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk'] },
                payroll: { type: 'role', title: "Payroll Specialist", subtitle: "Lead Support", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'] },
                
                cat_m_strat: { type: 'category', title: "Strategic Planning", belongsTo: 'manager', group: 'strategic' },
                cat_m_policy: { type: 'category', title: "Policy & Compliance", belongsTo: 'manager', group: 'strategic' },
                cat_m_payroll_oversight: { type: 'category', title: "Payroll Oversight", belongsTo: 'manager', group: 'strategic' },
                cat_m_meetings: { type: 'category', title: "Meeting Attendance", belongsTo: 'manager', group: 'operational' },
                cat_m_projects: { type: 'category', title: "HR Projects", belongsTo: 'manager', group: 'strategic' },
                
                cat_lifecycle: { type: 'category', title: "Employee Lifecycle", belongsTo: 'recruiter', group: 'operational' },
                cat_recruitment: { type: 'category', title: "Recruitment", belongsTo: 'recruiter', group: 'operational' },
                cat_ops: { type: 'category', title: "Operations", belongsTo: 'recruiter', group: 'operational' },
                cat_engagement: { type: 'category', title: "Staff Engagement", belongsTo: 'recruiter', group: 'operational' },
                cat_hr_payroll_admin: { type: 'category', title: "Monthly Payroll Admin", belongsTo: 'recruiter', group: 'operational' }, 
                
                cat_pay_monthly: { type: 'category', title: "Monthly Payroll", belongsTo: 'payroll', group: 'operational' },
                cat_pay_stat: { type: 'category', title: "Statutory Reporting", belongsTo: 'payroll', group: 'operational' },
                cat_pay_benefits: { type: 'category', title: "Benefits & Welfare", belongsTo: 'payroll', group: 'operational' },
                cat_pay_yearly: { type: 'category', title: "Yearly Compliance", belongsTo: 'payroll', group: 'operational' },

                m_strat_leadership: { type: 'task', title: "Strategic Leadership", hours: 15, belongsToCat: "cat_m_strat" },
                m_workforce: { type: 'task', title: "Workforce Planning", hours: 5, belongsToCat: "cat_m_strat" },
                m_handbook: { type: 'task', title: "Handbook & Policy", hours: 6, belongsToCat: "cat_m_policy" },
                m_legal: { type: 'task', title: "Legal Compliance", hours: 4, belongsToCat: "cat_m_policy" },
                m_payroll_audit: { type: 'task', title: "Final Payroll Audit", hours: 4, belongsToCat: "cat_m_payroll_oversight" },
                m_vendor_mgmt: { type: 'task', title: "Vendor Management", hours: 3, belongsToCat: "cat_m_payroll_oversight" },
                m_compliance_review: { type: 'task', title: "Compliance Review", hours: 5, belongsToCat: "cat_m_payroll_oversight" },
                m_attend_meetings: { type: 'task', title: "Attend Meetings", hours: 12, belongsToCat: "cat_m_meetings" },
                m_action_tracking: { type: 'task', title: "Action Tracking", hours: 4, belongsToCat: "cat_m_meetings" },
                m_hris: { type: 'task', title: "HRIS Implementation", hours: 8, belongsToCat: "cat_m_projects" },

                hr_onboarding: { type: 'task', title: "Onboarding", hours: 4, belongsToCat: "cat_lifecycle" },
                hr_offboarding: { type: 'task', title: "Offboarding", hours: 3, belongsToCat: "cat_lifecycle" },
                hr_recruitment: { type: 'task', title: "Recruitment", hours: 40, belongsToCat: "cat_recruitment" },
                hr_screening: { type: 'task', title: "Candidate Screening", hours: 4, belongsToCat: "cat_recruitment" },
                hr_workpass: { type: 'task', title: "Work Pass Admin", hours: 10, belongsToCat: "cat_ops" },
                hr_records: { type: 'task', title: "Records Admin", hours: 3, belongsToCat: "cat_ops" },
                hr_training: { type: 'task', title: "Training Admin", hours: 5, belongsToCat: "cat_ops" },
                hr_events: { type: 'task', title: "Engagement Events", hours: 8, belongsToCat: "cat_engagement" },
                hr_welfare: { type: 'task', title: "Staff Welfare", hours: 4, belongsToCat: "cat_engagement" },
                hr_claims_verification: { type: 'task', title: "Claims Verification", hours: 12, belongsToCat: "cat_hr_payroll_admin" },
                hr_payroll_entry: { type: 'task', title: "Payroll Data Entry", hours: 8, belongsToCat: "cat_hr_payroll_admin" },

                pay_salary: { type: 'task', title: "Salary Processing", hours: 25, belongsToCat: "cat_pay_monthly" },
                pay_claims: { type: 'task', title: "Claims Processing", hours: 10, belongsToCat: "cat_pay_monthly" },
                pay_bank: { type: 'task', title: "Bank Coordination", hours: 5, belongsToCat: "cat_pay_monthly" },
                pay_reporting: { type: 'task', title: "Payroll Reporting", hours: 8, belongsToCat: "cat_pay_monthly" },
                pay_iras: { type: 'task', title: "IRAS Tax Filings", hours: 10, belongsToCat: "cat_pay_stat" },
                pay_cpf: { type: 'task', title: "CPF Contribution Mgmt", hours: 6, belongsToCat: "cat_pay_stat" },
                pay_fin_report: { type: 'task', title: "Finance Payroll Report", hours: 6, belongsToCat: "cat_pay_stat" },
                pay_ghs: { type: 'task', title: "GHS Enrollments", hours: 8, belongsToCat: "cat_pay_benefits" },
                pay_tax_yearly: { type: 'task', title: "Yearly Tax Proc", hours: 40, belongsToCat: "cat_pay_yearly" },
                pay_audit: { type: 'task', title: "Payroll Auditing", hours: 20, belongsToCat: "cat_pay_yearly" }
            });

            // COORDINATE GRID
            const baseCoords = useMemo(() => ({
                ent_ceg: { x: 300, y: 200 }, ent_enr: { x: 600, y: 200 }, ent_hsk: { x: 900, y: 200 }, ent_klc: { x: 1200, y: 200 }, ent_tgi: { x: 1500, y: 200 }, ent_vn: { x: 1800, y: 200 }, ent_aus: { x: 2100, y: 200 },
                manager: { x: 600, y: 550 }, recruiter: { x: 1200, y: 550 }, payroll: { x: 1800, y: 550 },
                cat_m_strat: { x: 400, y: 850 }, cat_m_policy: { x: 500, y: 850 }, cat_m_payroll_oversight: { x: 600, y: 850 }, cat_m_meetings: { x: 700, y: 850 }, cat_m_projects: { x: 800, y: 850 },
                cat_lifecycle: { x: 1050, y: 850 }, cat_recruitment: { x: 1150, y: 850 }, cat_ops: { x: 1250, y: 850 }, cat_engagement: { x: 1350, y: 850 }, cat_hr_payroll_admin: { x: 1450, y: 850 },
                cat_pay_monthly: { x: 1650, y: 850 }, cat_pay_stat: { x: 1750, y: 850 }, cat_pay_benefits: { x: 1850, y: 850 }, cat_pay_yearly: { x: 1950, y: 850 },
                m_strat_leadership: { x: 400, y: 1100 }, m_workforce: { x: 400, y: 1180 }, 
                m_handbook: { x: 500, y: 1100 }, m_legal: { x: 500, y: 1180 },
                m_payroll_audit: { x: 600, y: 1100 }, m_vendor_mgmt: { x: 600, y: 1180 }, m_compliance_review: { x: 600, y: 1260 },
                m_attend_meetings: { x: 700, y: 1100 }, m_action_tracking: { x: 700, y: 1180 },
                m_hris: { x: 800, y: 1100 },
                hr_onboarding: { x: 1050, y: 1100 }, hr_offboarding: { x: 1050, y: 1180 },
                hr_recruitment: { x: 1150, y: 1100 }, hr_screening: { x: 1150, y: 1180 },
                hr_workpass: { x: 1250, y: 1100 }, hr_records: { x: 1250, y: 1180 }, hr_training: { x: 1250, y: 1260 },
                hr_events: { x: 1350, y: 1100 }, hr_welfare: { x: 1350, y: 1180 },
                hr_claims_verification: { x: 1450, y: 1100 }, hr_payroll_entry: { x: 1450, y: 1180 },
                pay_salary: { x: 1650, y: 1100 }, pay_claims: { x: 1650, y: 1180 }, pay_bank: { x: 1650, y: 1260 }, pay_reporting: { x: 1650, y: 1340 },
                pay_iras: { x: 1750, y: 1100 }, pay_cpf: { x: 1750, y: 1180 }, pay_fin_report: { x: 1750, y: 1260 },
                pay_ghs: { x: 1850, y: 1100 },
                pay_tax_yearly: { x: 1950, y: 1100 }, pay_audit: { x: 1950, y: 1180 }
            }), []);

            // Coverage Map
            const coverageMap = useMemo(() => ({
                manager: ['cat_lifecycle', 'cat_recruitment', 'cat_ops', 'cat_engagement', 'cat_hr_payroll_admin'],
                payroll: ['cat_lifecycle', 'cat_recruitment', 'cat_ops']
            }), []);

            // Admin Actions
            const updateNodeData = (key, field, value) => {
                setData(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            };

            const addNode = (type, parentId = null) => {
                const id = `${type}_${Date.now()}`;
                const baseNode = { type, title: `NEW ${type.toUpperCase()}` };
                if (type === 'entity') { baseNode.employeeCount = 10; baseNode.region = 'Singapore'; }
                else if (type === 'role') { baseNode.subtitle = 'NEW ROLE'; baseNode.reportsTo = []; }
                else if (type === 'category') { baseNode.belongsTo = parentId || 'manager'; }
                else if (type === 'task') { baseNode.belongsToCat = parentId || 'cat_m_strat'; baseNode.hours = 5; }
                setData(prev => ({ ...prev, [id]: baseNode }));
            };

            const deleteNode = (key) => {
                setData(prev => { const n = { ...prev }; delete n[key]; return n; });
            };

            // Reset Center Box - Default to 40%
            const resetView = useCallback(() => {
                if (containerRef.current) {
                    const { offsetWidth, offsetHeight } = containerRef.current;
                    const newZoom = 0.4; // Updated to 40% as requested
                    setZoomLevel(newZoom);
                    // Center content (approx 1200x650)
                    setOffset({
                        x: (offsetWidth / 2) - (1200 * newZoom),
                        y: (offsetHeight / 2) - (650 * newZoom)
                    });
                    setSelectedNode(null);
                }
            }, []);

            const dynamicCoords = useMemo(() => {
                const newCoords = { ...baseCoords };
                let targetId = activeNodeId;
                if (isIssues && !targetId) targetId = 'recruiter';
                if (!targetId) return newCoords;
                
                const activeNode = data[targetId];
                if (!activeNode) return newCoords;

                let focusRoleId = null;
                if (activeNode.type === 'role') focusRoleId = targetId;
                else if (activeNode.type === 'category') focusRoleId = activeNode.belongsTo;
                else if (activeNode.type === 'task') focusRoleId = data[activeNode.belongsToCat]?.belongsTo;

                if (focusRoleId) {
                    const centerRoleX = baseCoords[focusRoleId]?.x || 1200;
                    let relatedCats = Object.entries(data).filter(([id, v]) => v.type === 'category' && v.belongsTo === focusRoleId).map(([id]) => id);
                    if (isIssues && (focusRoleId === 'manager' || focusRoleId === 'payroll')) {
                        relatedCats = [...new Set([...relatedCats, ...(coverageMap[focusRoleId] || [])])];
                    }
                    const catSpacing = 220;
                    const catStartX = centerRoleX - ((relatedCats.length - 1) * catSpacing) / 2;

                    relatedCats.forEach((catId, catIdx) => {
                        const targetCatX = catStartX + (catIdx * catSpacing);
                        newCoords[catId] = { x: targetCatX, y: 820 };
                        const relatedTasks = Object.entries(data).filter(([id, v]) => v.type === 'task' && v.belongsToCat === catId).map(([id]) => id);
                        relatedTasks.forEach((taskId, taskIdx) => {
                            newCoords[taskId] = { x: targetCatX, y: 1020 + (taskIdx * 80) };
                        });
                    });
                }
                return newCoords;
            }, [activeNodeId, data, baseCoords, isIssues, coverageMap]);

            const stats = useMemo(() => {
                const roles = Object.entries(data).filter(([k,v]) => v.type === 'role').map(([k,v]) => k);
                const roleBreakdown = roles.map(r => ({
                    id: r,
                    title: data[r].title,
                    hours: Object.entries(data).filter(([k,v]) => v.type === 'task' && data[v.belongsToCat]?.belongsTo === r).reduce((s, [k,v]) => s + (Number(v.hours) || 0), 0),
                    population: (data[r]?.reportsTo || []).reduce((s, id) => s + (Number(data[id]?.employeeCount) || 0), 0),
                    tasks: Object.values(data).filter(v => v.type === 'task' && data[v.belongsToCat]?.belongsTo === r).length,
                    risk: getRoleHours(r) > 40 ? 'High' : (getRoleHours(r) > 35 ? 'Moderate' : 'Stable')
                }));

                function getRoleHours(r) {
                    return Object.entries(data).filter(([k,v]) => v.type === 'task' && data[v.belongsToCat]?.belongsTo === r).reduce((s, [k,v]) => s + (Number(v.hours) || 0), 0);
                }

                const catBreakdown = Object.entries(data).filter(([k,v]) => v.type === 'category').map(([k,v]) => ({
                    id: k,
                    title: v.title,
                    group: v.group || 'operational',
                    hours: Object.values(data).filter(t => t.belongsToCat === k).reduce((s, t) => s + (Number(t.hours) || 0), 0)
                })).sort((a,b) => b.hours - a.hours);

                const totalHours = roleBreakdown.reduce((s, r) => s + r.hours, 0);
                const staffCount = Object.values(data).filter(v => v.type === 'entity').reduce((s,v) => s + (v.employeeCount || 0), 0);
                const stratHours = catBreakdown.filter(c => c.group === 'strategic').reduce((s, c) => s + c.hours, 0);
                const opsHours = totalHours - stratHours;

                return { roleBreakdown, catBreakdown, totalHours, staffCount, hrRatio: Math.round(staffCount / roles.length), stratSplit: { strat: Math.round((stratHours/totalHours)*100), ops: Math.round((opsHours/totalHours)*100) } };
            }, [data]);

            const handleWheel = useCallback((e) => { e.preventDefault(); setZoomLevel(prev => Math.min(Math.max(0.1, prev - e.deltaY * 0.001), 1.5)); }, []);
            const handleMouseDown = (e) => { if (e.button === 0) { setIsPanning(true); setLastMousePos({ x: e.clientX, y: e.clientY }); } };
            const handleMouseMove = (e) => {
                if (!isPanning) return;
                setOffset(prev => ({ x: prev.x + (e.clientX - lastMousePos.x), y: prev.y + (e.clientY - lastMousePos.y) }));
                setLastMousePos({ x: e.clientX, y: e.clientY });
            };

            useEffect(() => {
                const container = containerRef.current;
                if (container) {
                    container.addEventListener('wheel', handleWheel, { passive: false });
                    return () => container.removeEventListener('wheel', handleWheel);
                }
            }, [handleWheel]);

            const renderNode = (nodeKey) => {
                const nodeData = data[nodeKey];
                const isFocused = activeNodeId === nodeKey;
                
                let isVisible = isAdmin || nodeData.type !== 'task' || (isFocused || nodeData.belongsToCat === activeNodeId || (data[activeNodeId]?.type === 'role' && data[nodeData.belongsToCat]?.belongsTo === activeNodeId));
                if (isIssues && nodeData.type === 'category' && nodeData.belongsTo === 'recruiter') isVisible = true;
                if (isIssues && nodeData.type === 'task' && (coverageMap[activeNodeId] || []).includes(nodeData.belongsToCat)) isVisible = true;

                const { x, y } = dynamicCoords[nodeKey] || { x: 1200, y: 500 };
                
                let isRelated = false;
                if (activeNodeId) {
                    if (nodeKey === activeNodeId) isRelated = true;
                    else if (nodeData.type === 'category' && (nodeData.belongsTo === activeNodeId || data[activeNodeId]?.belongsToCat === nodeKey)) isRelated = true;
                    else if (nodeData.type === 'role' && (data[activeNodeId]?.belongsTo === nodeKey)) isRelated = true;
                    else if (nodeData.type === 'task' && (nodeData.belongsToCat === activeNodeId || (data[activeNodeId]?.type === 'role' && data[nodeData.belongsToCat]?.belongsTo === activeNodeId))) isRelated = true;
                    
                    if (isIssues && (activeNodeId === 'manager' || activeNodeId === 'payroll')) {
                        if ((coverageMap[activeNodeId] || []).includes(nodeKey)) isRelated = true;
                        if (nodeData.type === 'task' && (coverageMap[activeNodeId] || []).includes(nodeData.belongsToCat)) isRelated = true;
                    }
                }

                return (
                    <div key={nodeKey} 
                        onClick={(e) => { e.stopPropagation(); setSelectedNode(prev => prev === nodeKey ? null : nodeKey); }}
                        onMouseEnter={() => setHoveredNode(nodeKey)} 
                        onMouseLeave={() => setHoveredNode(null)} 
                        className={`group absolute transform -translate-x-1/2 -translate-y-1/2 node-card
                            ${nodeData.type === 'entity' ? 'w-64 p-8 rounded-2xl' : (nodeData.type === 'role' ? 'w-80 p-8 rounded-[2rem]' : (nodeData.type === 'category' ? 'w-56 p-5 rounded-xl' : 'w-52 p-4 rounded-full'))} 
                            ${isFocused ? 'active-glow scale-[1.08] z-[300]' : 'z-10'} 
                            ${nodeKey === 'recruiter' && isIssues ? 'border-red-500 bg-red-50 grayscale-[0.5]' : ''}
                            ${isRelated && !isFocused ? 'border-indigo-500 z-[200] scale-[1.04]' : ''} 
                            ${isVisible ? 'opacity-100' : 'opacity-0 scale-90 pointer-events-none'}
                            ${activeNodeId && !isRelated && isVisible ? 'opacity-[0.15] grayscale-[0.6] blur-[2px]' : 'cursor-pointer'}`} 
                        style={{ left: `${x}px`, top: `${y}px` }}
                    >
                        {isAdmin && (
                            <button onClick={(e) => { e.stopPropagation(); deleteNode(nodeKey); }} className="absolute -top-3 -right-3 bg-red-500 text-white p-2 rounded-full shadow-lg hover:scale-110 transition-transform z-[400]"><Icon name="trash" size={14}/></button>
                        )}

                        {nodeData.type === 'entity' ? (
                            <div className="text-left">
                                <input className="admin-input text-[10px] font-black uppercase text-slate-400 mb-1 tracking-widest" value={nodeData.region} onChange={e => updateNodeData(nodeKey, 'region', e.target.value)} disabled={!isAdmin} />
                                <input className="admin-input font-black text-[24px] uppercase tracking-tighter mb-4 text-slate-900" value={nodeData.title} onChange={e => updateNodeData(nodeKey, 'title', e.target.value)} disabled={!isAdmin} />
                                <div className={`w-full py-3 rounded-xl flex flex-col items-center justify-center gap-1 ${isRelated ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-100 text-slate-500'}`}>
                                    <div className="flex items-center gap-2"><Icon name="users" size={16}/><input type="number" className="bg-transparent w-12 text-center font-black text-xl outline-none" value={nodeData.employeeCount} onChange={e => updateNodeData(nodeKey, 'employeeCount', e.target.value)} disabled={!isAdmin} /></div>
                                </div>
                            </div>
                        ) : nodeData.type === 'role' ? (
                            <div className="flex flex-col text-left">
                                <div className="flex justify-between items-center mb-6">
                                    <input className="admin-input text-[10px] font-black uppercase text-slate-400 tracking-widest" value={nodeData.subtitle} onChange={e => updateNodeData(nodeKey, 'subtitle', e.target.value)} disabled={!isAdmin} />
                                    <div className="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-[11px] font-bold whitespace-nowrap">P: {stats.roleBreakdown.find(r => r.id === nodeKey)?.population}</div>
                                </div>
                                <input className="admin-input font-black text-[30px] leading-none mb-6 uppercase tracking-tighter text-slate-900" value={nodeData.title} onChange={e => updateNodeData(nodeKey, 'title', e.target.value)} disabled={!isAdmin} />
                                {nodeKey === 'recruiter' && isIssues ? (
                                    <div className="w-full py-2 bg-red-600 text-white rounded-xl text-center font-black text-xs tracking-widest animate-pulse">POSITION VACANT</div>
                                ) : (
                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100">
                                        <div className="flex justify-between items-center mb-2 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                            <span>Util Rate</span>
                                            <span className={`text-lg font-black ${stats.roleBreakdown.find(r => r.id === nodeKey)?.hours > 40 ? 'text-red-500' : 'text-indigo-600'}`}>{stats.roleBreakdown.find(r => r.id === nodeKey)?.hours}h</span>
                                        </div>
                                        <div className="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden"><div className={`h-full transition-all duration-1000 ${stats.roleBreakdown.find(r => r.id === nodeKey)?.hours > 40 ? 'bg-red-500' : 'bg-indigo-600'}`} style={{ width: `${Math.min((stats.roleBreakdown.find(r => r.id === nodeKey)?.hours / 40) * 100, 100)}%` }}/></div>
                                    </div>
                                )}
                            </div>
                        ) : nodeData.type === 'category' ? (
                            <div className="flex flex-col text-left">
                                <div className="flex justify-between items-center mb-2 gap-2">
                                    <input className={`admin-input text-[13px] font-black uppercase truncate leading-none ${isIssues && nodeData.belongsTo === 'recruiter' ? 'text-red-600' : 'text-slate-800'}`} value={nodeData.title} onChange={e => updateNodeData(nodeKey, 'title', e.target.value)} disabled={!isAdmin} />
                                    <Icon name="chevron" size={16} className={`text-slate-400 flex-shrink-0 ${isFocused ? 'rotate-90' : ''}`}/>
                                </div>
                            </div>
                        ) : (
                            <div className="flex items-center gap-3 px-2 text-left">
                                <div className="p-2.5 bg-indigo-50 rounded-full flex-shrink-0"><Icon name="clock" size={14} className="text-indigo-500" /></div>
                                <div className="truncate flex-1">
                                    <input className="admin-input text-[12px] font-bold truncate uppercase text-slate-700 mb-1" value={nodeData.title} onChange={e => updateNodeData(nodeKey, 'title', e.target.value)} disabled={!isAdmin} />
                                    <div className="flex items-center gap-1"><input type="number" className="bg-transparent w-8 font-black text-[10px] text-indigo-500 outline-none" value={nodeData.hours} onChange={e => updateNodeData(nodeKey, 'hours', e.target.value)} disabled={!isAdmin} /><span className="text-[10px] font-black text-indigo-500 uppercase tracking-tighter">HRS</span></div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-screen relative flex flex-col p-8 lg:p-12" onClick={() => setSelectedNode(null)}>
                    <header className="relative z-[500] flex flex-col lg:flex-row justify-between items-center gap-8 glass-panel p-10 rounded-[3rem] mb-12 shadow-sm border border-slate-200">
                        <div className="flex items-center gap-10 text-left">
                            <div className="p-6 bg-slate-900 rounded-[2rem] shadow-2xl"><Icon name="shield" size={36} className="text-white"/></div>
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter uppercase leading-none mb-2 text-slate-900">Strategic HR Synergy Map</h1>
                                <p className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.45em]">Validated Organizational Blueprint</p>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-slate-200/40 p-2 rounded-2xl border border-slate-200/50">
                            {['presentation', 'current_situation', 'analytics', 'admin'].map(m => (
                                <button key={m} onClick={(e) => { e.stopPropagation(); setViewMode(m); }} className={`px-10 py-4 rounded-xl text-[12px] font-black transition-all tracking-widest uppercase ${viewMode === m ? 'bg-white text-slate-900 shadow-xl scale-105' : 'text-slate-500 hover:text-slate-900'}`}>
                                    {m.replace('_', ' ')}
                                </button>
                            ))}
                        </div>
                    </header>

                    {viewMode === 'analytics' ? (
                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-6 text-left pb-24 space-y-12 h-0">
                            {/* KPI SCOREBOARD */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                <div className="pro-card border-b-4 border-slate-900">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Global Capacity</div>
                                        <div className="p-2 bg-slate-50 rounded-lg text-slate-400"><Icon name="activity" size={16}/></div>
                                    </div>
                                    <div className="text-7xl font-black text-slate-900 tracking-tighter mb-2">{stats.totalHours}</div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Weekly Hours</div>
                                </div>
                                <div className="pro-card border-b-4 border-indigo-600">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Service Intensity</div>
                                        <div className="p-2 bg-indigo-50 rounded-lg text-indigo-400"><Icon name="users" size={16}/></div>
                                    </div>
                                    <div className="text-7xl font-black text-indigo-600 tracking-tighter mb-2">1:{stats.hrRatio}</div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">HR-to-Staff Ratio</div>
                                </div>
                                <div className="pro-card border-b-4 border-emerald-500">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Strategic Mix</div>
                                        <div className="p-2 bg-emerald-50 rounded-lg text-emerald-400"><Icon name="target" size={16}/></div>
                                    </div>
                                    <div className="text-7xl font-black text-slate-900 tracking-tighter mb-2">{stats.stratSplit.strat}%</div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">High-Level Focus</div>
                                </div>
                                <div className="pro-card border-b-4 border-orange-400">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Audit Score</div>
                                        <div className="p-2 bg-orange-50 rounded-lg text-orange-400"><Icon name="shield" size={16}/></div>
                                    </div>
                                    <div className="text-7xl font-black text-slate-900 tracking-tighter mb-2">94<span className="text-3xl opacity-20">.2</span></div>
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Compliance Health</div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                {/* WORKFORCE HEALTH STATUS */}
                                <div className="lg:col-span-2 pro-card">
                                    <div className="flex justify-between items-center mb-10">
                                        <h3 className="text-sm font-black uppercase tracking-[0.4em] text-slate-400">Organization Health & Capacity</h3>
                                        <div className="flex gap-4">
                                            <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-emerald-500"/> <span className="text-[10px] font-black uppercase text-slate-400">Stable</span></div>
                                            <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-red-500"/> <span className="text-[10px] font-black uppercase text-slate-400">At Risk</span></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-12">
                                        {stats.roleBreakdown.map(r => (
                                            <div key={r.id} className="text-center">
                                                <div className="relative inline-block mb-6">
                                                    <svg className="w-32 h-32 transform -rotate-90">
                                                        <circle cx="64" cy="64" r="58" stroke="currentColor" strokeWidth="8" fill="transparent" className="text-slate-100" />
                                                        <circle cx="64" cy="64" r="58" stroke="currentColor" strokeWidth="8" fill="transparent" strokeDasharray={364} strokeDashoffset={364 - (364 * Math.min(r.hours/40, 1.2))} className={`${r.hours > 40 ? 'text-red-500' : 'text-indigo-600'} transition-all duration-1000`} />
                                                    </svg>
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                        <div className="text-2xl font-black text-slate-900">{Math.round((r.hours/40)*100)}%</div>
                                                        <div className="text-[8px] font-black uppercase text-slate-400 tracking-tighter">UTIL</div>
                                                    </div>
                                                </div>
                                                <div className="font-black text-slate-900 uppercase tracking-tighter mb-1">{r.title}</div>
                                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">{r.hours} Hours Managed</div>
                                                <div className={`inline-block px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest ${r.risk === 'High' ? 'bg-red-50 text-red-500 border border-red-100' : 'bg-emerald-50 text-emerald-500 border border-emerald-100'}`}>
                                                    {r.risk} Load
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* STRATEGIC BALANCE */}
                                <div className="pro-card bg-slate-900 text-white border-none shadow-2xl">
                                    <h3 className="text-sm font-black uppercase tracking-[0.4em] text-slate-500 mb-10">Strategic Positioning</h3>
                                    <div className="space-y-12">
                                        <div>
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="text-xs font-black uppercase tracking-widest flex items-center gap-3"><Icon name="target" size={14} className="text-emerald-400"/> Strategic Planning</div>
                                                <div className="text-lg font-black text-emerald-400">{stats.stratSplit.strat}%</div>
                                            </div>
                                            <div className="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-emerald-400 rounded-full" style={{ width: `${stats.stratSplit.strat}%` }}/>
                                            </div>
                                        </div>
                                        <div>
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="text-xs font-black uppercase tracking-widest flex items-center gap-3"><Icon name="layers" size={14} className="text-indigo-400"/> Daily Operations</div>
                                                <div className="text-lg font-black text-indigo-400">{stats.stratSplit.ops}%</div>
                                            </div>
                                            <div className="w-full h-2 bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-indigo-400 rounded-full" style={{ width: `${stats.stratSplit.ops}%` }}/>
                                            </div>
                                        </div>
                                        <div className="pt-8 border-t border-white/5">
                                            <div className="p-6 bg-white/5 rounded-2xl border border-white/5">
                                                <div className="flex items-center gap-4 mb-3">
                                                    <div className="p-2 bg-emerald-500/10 rounded-lg text-emerald-400"><Icon name="alert" size={14}/></div>
                                                    <div className="text-[10px] font-black uppercase tracking-widest text-emerald-400">Recommendation</div>
                                                </div>
                                                <p className="text-[11px] leading-relaxed text-slate-400 font-medium">The current architecture maintains a <strong>{stats.stratSplit.strat}%</strong> strategic focus. Aim for +5% optimization by automating Monthly Payroll Admin tasks.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* MODULE INTENSITY LIST */}
                            <div className="pro-card">
                                <h3 className="text-sm font-black uppercase tracking-[0.4em] text-slate-400 mb-10">Resource Intensity Ranking</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-6">
                                    {stats.catBreakdown.map((c, i) => (
                                        <div key={c.id} className="flex items-center gap-6 p-6 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100 group">
                                            <div className="font-black text-slate-200 text-3xl transition-colors group-hover:text-indigo-200 w-10">{(i+1).toString().padStart(2, '0')}</div>
                                            <div className="flex-1">
                                                <div className="font-black text-slate-900 uppercase tracking-tighter leading-none mb-1 group-hover:text-indigo-600 transition-colors">{c.title}</div>
                                                <div className="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">{c.group}</div>
                                            </div>
                                            <div className="text-xl font-black text-slate-900 group-hover:text-indigo-600">{c.hours}<span className="text-[10px] ml-1 opacity-20">H</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 relative flex gap-8">
                            {isAdmin && (
                                <div className="w-80 glass-panel p-10 rounded-[3rem] flex flex-col gap-8 animate-popup z-[600] shadow-2xl border border-slate-200">
                                    <div className="text-[12px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Structure Control</div>
                                    <button onClick={() => addNode('entity')} className="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black text-[12px] uppercase tracking-widest hover:scale-105 transition-transform flex items-center justify-center gap-3 shadow-xl"><Icon name="plus" size={16}/> New Entity</button>
                                    <button onClick={() => addNode('role')} className="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black text-[12px] uppercase tracking-widest hover:scale-105 transition-transform flex items-center justify-center gap-3 shadow-xl shadow-indigo-200"><Icon name="plus" size={16}/> New Role</button>
                                    <div className="h-px bg-slate-200 my-4" />
                                    <button onClick={() => addNode('category', selectedNode)} className="w-full py-5 bg-white border-2 border-indigo-100 text-indigo-600 rounded-[1.5rem] font-black text-[12px] uppercase tracking-widest hover:bg-indigo-50 transition-colors flex items-center justify-center gap-3"><Icon name="plus" size={16}/> New Module</button>
                                    <button onClick={() => addNode('task', selectedNode)} className="w-full py-5 bg-white border-2 border-indigo-100 text-indigo-600 rounded-[1.5rem] font-black text-[12px] uppercase tracking-widest hover:bg-indigo-50 transition-colors flex items-center justify-center gap-3"><Icon name="plus" size={16}/> New Task</button>
                                </div>
                            )}

                            <div 
                                ref={containerRef}
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={() => setIsPanning(false)}
                                onMouseLeave={() => setIsPanning(false)}
                                className="flex-1 relative bg-white/40 rounded-[4rem] border border-slate-200 overflow-hidden touch-none shadow-inner"
                            >
                                <div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,rgba(99,102,241,0.01),transparent_70%)]" />
                                <div 
                                    className="absolute inset-0 transition-all duration-300 pointer-events-none" 
                                    style={{ transform: `translate(${offset.x}px, ${offset.y}px) scale(${zoomLevel})`, transformOrigin: '0 0' }}
                                >
                                    <div className="pointer-events-auto w-[2400px] h-[3000px] relative">
                                        {/* Reporting Lines */}
                                        {Object.entries(data).filter(([k,v]) => v.type === 'role').map(([k, v]) => (
                                            v.reportsTo?.map(ent => {
                                                const isCoveringFocused = isIssues && (activeNodeId === 'manager' || activeNodeId === 'payroll');
                                                return (
                                                    <Connection 
                                                        key={`${k}-${ent}`} start={dynamicCoords[ent]} end={dynamicCoords[k]} color="#cbd5e1" isReporting={true} 
                                                        active={!isCoveringFocused && (activeNodeId === k || activeNodeId === ent)} isFaint={isCoveringFocused}
                                                    />
                                                );
                                            })
                                        ))}
                                        
                                        {/* Job Lines */}
                                        {Object.entries(data).filter(([k,v]) => v.type === 'category').flatMap(([k, v]) => {
                                            const sourceKey = v.belongsTo;
                                            const connectionLines = [];
                                            const isCoveringFocused = isIssues && (activeNodeId === 'manager' || activeNodeId === 'payroll');

                                            if (!(isIssues && sourceKey === 'recruiter')) {
                                                connectionLines.push(
                                                    <Connection 
                                                        key={`${k}-cat-normal`} start={dynamicCoords[sourceKey]} end={dynamicCoords[k]} color="#6366f1" pulsing={true}
                                                        active={!isCoveringFocused && (activeNodeId === k || activeNodeId === sourceKey)} isFaint={isCoveringFocused}
                                                    />
                                                );
                                            } else {
                                                if (coverageMap.manager.includes(k)) {
                                                    connectionLines.push(<Connection key={`${k}-mgr-cover`} start={dynamicCoords['manager']} end={dynamicCoords[k]} color="#ef4444" pulsing={true} active={activeNodeId === 'manager' || activeNodeId === k} isFaint={isCoveringFocused && activeNodeId !== 'manager'} />);
                                                }
                                                if (coverageMap.payroll.includes(k)) {
                                                    connectionLines.push(<Connection key={`${k}-pay-cover`} start={dynamicCoords['payroll']} end={dynamicCoords[k]} color="#ef4444" pulsing={true} active={activeNodeId === 'payroll' || activeNodeId === k} isFaint={isCoveringFocused && activeNodeId !== 'payroll'} />);
                                                }
                                            }
                                            return connectionLines;
                                        })}

                                        {/* Task Lines */}
                                        {Object.entries(data).filter(([k,v]) => v.type === 'task').map(([k, v]) => {
                                            const isCoveringFocused = isIssues && (activeNodeId === 'manager' || activeNodeId === 'payroll');
                                            const isCoveredTaskParent = isIssues && (coverageMap[activeNodeId || ''] || []).includes(v.belongsToCat);

                                            return (
                                                <Connection 
                                                    key={`${k}-line`} start={dynamicCoords[v.belongsToCat]} end={dynamicCoords[k]} color="#818CF8" 
                                                    active={isCoveringFocused ? isCoveredTaskParent && (activeNodeId === k || activeNodeId === v.belongsToCat) : (activeNodeId === k || activeNodeId === v.belongsToCat)}
                                                    isFaint={isCoveringFocused && !isCoveredTaskParent} pulsing={true}
                                                />
                                            );
                                        })}

                                        {Object.keys(data).map(nodeKey => renderNode(nodeKey))}
                                    </div>
                                </div>

                                {/* Reset Center Box: Bottom Right, Smaller, 40% zoom */}
                                <div className="absolute bottom-12 right-12 flex flex-col items-end gap-3 z-[500]">
                                    <button onClick={resetView} className="bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3 text-[11px] font-black uppercase tracking-widest border border-slate-700">
                                        <Icon name="refresh" size={14}/> Reset Center
                                    </button>
                                    <div className="bg-white/90 backdrop-blur px-5 py-3 rounded-2xl border border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-widest shadow-xl">
                                        Zoom: {Math.round(zoomLevel * 100)}%
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
