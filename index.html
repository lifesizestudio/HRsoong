<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic HR Architecture Map - Analytics Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: #e2e8f0; overflow-x: hidden; }
        
        @keyframes lineFlow {
            from { stroke-dashoffset: 24; }
            to { stroke-dashoffset: 0; }
        }

        .animate-running-line {
            stroke-dasharray: 6, 12; 
            animation: lineFlow 0.8s linear infinite;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(-5px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-popup {
            animation: fadeInScale 0.3s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .touch-none { touch-action: none; }
        
        .node-transition { 
            transition: opacity 0.4s ease, 
                        transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        filter 0.4s ease,
                        box-shadow 0.4s ease; 
        }
        
        .glow-active { box-shadow: 0 0 40px rgba(99, 102, 241, 0.5); }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
                users: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2m15-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                chevron: <polyline points="9 18 15 12 9 6" />,
                bar: <><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
                trending: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18" /><path d="M17 6h6v6"/></>,
                pie: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const Connection = ({ start, end, color, active, isFaint, isReporting, pulsing, visible }) => {
            if (!start || !end) return null;
            const midX = (start.x + end.x) / 2;
            const path = `M ${start.x} ${start.y} C ${midX} ${start.y}, ${midX} ${end.y}, ${end.x} ${end.y}`;
            
            // Clean logic: If something is active, dim the rest almost to zero
            const baseOpacity = visible ? (active ? 'opacity-100' : (isFaint ? 'opacity-[0.02]' : (isReporting ? 'opacity-10' : 'opacity-10'))) : 'opacity-0 pointer-events-none';
            const strokeWidth = active ? "1.5" : "0.2";

            return (
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0 transition-opacity duration-500" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d={path} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeDasharray={isReporting ? "1 4" : "none"} className={`${baseOpacity} transition-all duration-700 ease-in-out ${pulsing && active ? 'animate-running-line' : ''}`}/>
                </svg>
            );
        };

        function App() {
            const [viewMode, setViewMode] = useState('presentation');
            const [zoomLevel, setZoomLevel] = useState(0.8);
            const [hoveredNode, setHoveredNode] = useState(null);
            const [selectedNode, setSelectedNode] = useState(null);
            const containerRef = useRef(null);

            const activeNodeId = selectedNode || hoveredNode;
            const isAdmin = viewMode === 'admin';

            const [data] = useState({
                ent_ceg: { type: 'entity', title: "CEG CORP", employeeCount: 30, region: 'Singapore' },
                ent_enr: { type: 'entity', title: "Enrichment", employeeCount: 125, region: 'Singapore', breakdown: { ft: 30, pt: 60, fl: 35 } },
                ent_hsk: { type: 'entity', title: "HSK", employeeCount: 10, region: 'Singapore' },
                ent_klc: { type: 'entity', title: "KLC", employeeCount: 100, region: 'Singapore' },
                ent_tgi: { type: 'entity', title: "TGI", employeeCount: 15, region: 'Singapore' },
                ent_vn: { type: 'entity', title: "Vietnam", employeeCount: 100, region: 'Overseas' },
                ent_aus: { type: 'entity', title: "Australia", employeeCount: 0, region: 'Overseas' },
                
                manager: { type: 'role', title: "HR Manager", subtitle: "Lead", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi', 'ent_vn', 'ent_aus'] },
                recruiter: { type: 'role', title: "HR Executive", subtitle: "Execution", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk'] },
                payroll: { type: 'role', title: "Payroll Specialist", subtitle: "Support", reportsTo: ['ent_ceg', 'ent_enr', 'ent_hsk', 'ent_klc', 'ent_tgi'] },
                
                cat_m_strat: { type: 'category', title: "Strategic Planning", belongsTo: 'manager', theme: 'indigo' },
                cat_m_policy: { type: 'category', title: "Policy & Compliance", belongsTo: 'manager', theme: 'indigo' },
                cat_m_talent: { type: 'category', title: "Talent & Performance", belongsTo: 'manager', theme: 'indigo' },
                cat_m_policy_improve: { type: 'category', title: "HR Policy Improvement", belongsTo: 'manager', theme: 'indigo' },
                cat_m_projects: { type: 'category', title: "Strategic HR Projects", belongsTo: 'manager', theme: 'indigo' },

                m_workforce: { type: 'task', title: "Workforce Planning", hours: 5, belongsToCat: "cat_m_strat", theme: 'indigo' },
                m_budget: { type: 'task', title: "HR Budgeting", hours: 4, belongsToCat: "cat_m_strat", theme: 'indigo' },
                m_handbook: { type: 'task', title: "Handbook & Policy", hours: 6, belongsToCat: "cat_m_policy", theme: 'indigo' },
                m_legal: { type: 'task', title: "Legal Compliance", hours: 4, belongsToCat: "cat_m_policy", theme: 'indigo' },
                m_appraisal: { type: 'task', title: "Performance Framework", hours: 5, belongsToCat: "cat_m_talent", theme: 'indigo' },
                m_succession: { type: 'task', title: "Succession Planning", hours: 4, belongsToCat: "cat_m_talent", theme: 'indigo' },
                m_policy_review: { type: 'task', title: "Policy Review & Gap Analysis", hours: 5, belongsToCat: "cat_m_policy_improve", theme: 'indigo' },
                m_process_opt: { type: 'task', title: "Process Optimization", hours: 4, belongsToCat: "cat_m_policy_improve", theme: 'indigo' },
                m_hris: { type: 'task', title: "HRIS Implementation", hours: 8, belongsToCat: "cat_m_projects", theme: 'indigo' },
                m_digitization: { type: 'task', title: "Digital Transformation", hours: 4, belongsToCat: "cat_m_projects", theme: 'indigo' },

                cat_lifecycle: { type: 'category', title: "Employee Lifecycle", belongsTo: 'recruiter', theme: 'indigo' },
                cat_recruitment: { type: 'category', title: "Recruitment Support", belongsTo: 'recruiter', theme: 'indigo' },
                cat_ops: { type: 'category', title: "HR Operations", belongsTo: 'recruiter', theme: 'indigo' },
                cat_exec_monthly: { type: 'category', title: "Payroll Admin (Monthly)", belongsTo: 'recruiter', theme: 'emerald' },
                cat_exec_yearly: { type: 'category', title: "Compliance (Yearly)", belongsTo: 'recruiter', theme: 'slate' },

                hr_onboarding: { type: 'task', title: "Onboarding", hours: 4, belongsToCat: "cat_lifecycle", theme: 'indigo' },
                hr_offboarding: { type: 'task', title: "Offboarding", hours: 2, belongsToCat: "cat_lifecycle", theme: 'indigo' },
                hr_job_post: { type: 'task', title: "Job Posting", hours: 3, belongsToCat: "cat_recruitment", theme: 'indigo' },
                hr_screening: { type: 'task', title: "Screening", hours: 4, belongsToCat: "cat_recruitment", theme: 'indigo' },
                hr_records: { type: 'task', title: "Records Admin", hours: 3, belongsToCat: "cat_ops", theme: 'indigo' },
                hr_work_pass: { type: 'task', title: "Work Pass", hours: 3, belongsToCat: "cat_ops", theme: 'indigo' },
                hr_claims_verify: { type: 'task', title: "Claims Verify", hours: 4, belongsToCat: "cat_exec_monthly", theme: 'emerald' },
                hr_tax_yr_exec: { type: 'task', title: "Yearly Tax", hours: 40, belongsToCat: "cat_exec_yearly", theme: 'slate' },

                cat_pay_benefits: { type: 'category', title: "Benefits & Insurance", belongsTo: 'payroll', theme: 'indigo' },
                cat_pay_monthly: { type: 'category', title: "Payroll Operations", belongsTo: 'payroll', theme: 'emerald' },
                cat_pay_yearly: { type: 'category', title: "Yearly Compliance", belongsTo: 'payroll', theme: 'slate' },

                pay_insurance: { type: 'task', title: "Insurance Admin", hours: 5, belongsToCat: "cat_pay_benefits", theme: 'indigo' },
                pay_salary: { type: 'task', title: "Salary Processing", hours: 25, belongsToCat: "cat_pay_monthly", theme: 'emerald' },
                pay_claims: { type: 'task', title: "Claims Processing", hours: 10, belongsToCat: "cat_pay_monthly", theme: 'emerald' },
                pay_tax_yr: { type: 'task', title: "Tax Processing", hours: 40, belongsToCat: "cat_pay_yearly", theme: 'slate' },
                pay_audit_yr: { type: 'task', title: "Payroll Auditing", hours: 20, belongsToCat: "cat_pay_yearly", theme: 'slate' }
            });

            // Base coordinates (Stable)
            const coords = {
                ent_ceg: { x: 12, y: 10 }, ent_enr: { x: 12, y: 22 }, ent_hsk: { x: 12, y: 34 }, ent_klc: { x: 12, y: 46 }, ent_tgi: { x: 12, y: 58 }, ent_vn: { x: 12, y: 70 }, ent_aus: { x: 12, y: 82 },
                manager: { x: 38, y: 18 }, recruiter: { x: 38, y: 50 }, payroll: { x: 38, y: 86 },
                cat_m_strat: { x: 65, y: 6 }, cat_m_policy: { x: 65, y: 12 }, cat_m_talent: { x: 65, y: 18 }, cat_m_policy_improve: { x: 65, y: 24 }, cat_m_projects: { x: 65, y: 30 },
                m_workforce: { x: 92, y: 4 }, m_budget: { x: 92, y: 7 }, m_handbook: { x: 92, y: 10 }, m_legal: { x: 92, y: 13 }, m_appraisal: { x: 92, y: 16 }, m_succession: { x: 92, y: 19 }, m_policy_review: { x: 92, y: 22 }, m_process_opt: { x: 92, y: 25 }, m_hris: { x: 92, y: 29 }, m_digitization: { x: 92, y: 31 },
                cat_lifecycle: { x: 65, y: 38 }, cat_recruitment: { x: 65, y: 46 }, cat_ops: { x: 65, y: 54 }, cat_exec_monthly: { x: 65, y: 62 }, cat_exec_yearly: { x: 65, y: 70 },
                hr_onboarding: { x: 92, y: 36 }, hr_offboarding: { x: 92, y: 40 }, hr_job_post: { x: 92, y: 44 }, hr_screening: { x: 92, y: 48 }, hr_records: { x: 92, y: 52 }, hr_work_pass: { x: 92, y: 56 }, hr_claims_verify: { x: 92, y: 62 }, hr_tax_yr_exec: { x: 92, y: 70 },
                cat_pay_benefits: { x: 65, y: 78 }, cat_pay_monthly: { x: 65, y: 84 }, cat_pay_yearly: { x: 65, y: 92 },
                pay_insurance: { x: 92, y: 78 }, pay_salary: { x: 92, y: 84 }, pay_claims: { x: 92, y: 88 }, pay_tax_yr: { x: 92, y: 93 }, pay_audit_yr: { x: 92, y: 97 }
            };

            const stats = useMemo(() => {
                const roles = ['manager', 'recruiter', 'payroll'];
                const roleStats = roles.map(r => ({
                    id: r,
                    title: data[r].title,
                    hours: Object.entries(data).filter(([k,v]) => v.belongsTo === r).reduce((s, [k,v]) => s + Object.values(data).filter(n => n.belongsToCat === k).reduce((ss, t) => ss + (t.hours || 0), 0), 0),
                    population: (data[r].reportsTo || []).reduce((s, id) => s + (data[id]?.employeeCount || 0), 0)
                }));
                const totalHours = roleStats.reduce((s, r) => s + r.hours, 0);
                const totalStaff = Object.values(data).filter(v => v.type === 'entity').reduce((s,v) => s + v.employeeCount, 0);
                return { roleStats, totalHours, totalStaff };
            }, [data]);

            const isNodeVisible = (nodeKey) => {
                const node = data[nodeKey];
                if (!node || viewMode === 'admin') return true;
                if (node.type === 'entity' || node.type === 'role' || node.type === 'category') return true;
                if (node.type === 'task') return activeNodeId === node.belongsToCat || activeNodeId === nodeKey || data[activeNodeId]?.belongsToCat === node.belongsToCat;
                return false;
            };

            const renderNode = (nodeKey) => {
                const nodeData = data[nodeKey];
                const visible = isNodeVisible(nodeKey);
                const { x, y } = coords[nodeKey] || { x: 50, y: 50 };
                const isEntity = nodeData.type === 'entity';
                const isRole = nodeData.type === 'role';
                const isCategory = nodeData.type === 'category';
                const isFocused = activeNodeId === nodeKey;
                const activeData = data[activeNodeId];

                let isRelated = false;
                if (activeNodeId) {
                    if (nodeKey === activeNodeId) isRelated = true;
                    else if (isEntity && activeData?.type === 'role') isRelated = activeData.reportsTo?.includes(nodeKey);
                    else if (isCategory && activeData?.type === 'role') isRelated = nodeData.belongsTo === activeNodeId;
                    else if (isRole && (activeData?.type === 'category' || activeData?.type === 'task')) {
                         const catId = activeData.type === 'task' ? activeData.belongsToCat : activeNodeId;
                         isRelated = data[catId]?.belongsTo === nodeKey;
                    }
                    else if (nodeData.type === 'task' && activeData?.type === 'category') isRelated = nodeData.belongsToCat === activeNodeId;
                    else if (isCategory && activeData?.type === 'task') isRelated = activeData.belongsToCat === nodeKey;
                }

                const themes = {
                    indigo: 'bg-slate-900/90 border-indigo-500/30 text-indigo-100',
                    emerald: 'bg-slate-900/90 border-emerald-500/30 text-emerald-100',
                    slate: 'bg-slate-900/90 border-slate-600/30 text-slate-100',
                    entity: 'bg-slate-900/90 border-white/10 text-white shadow-xl'
                };

                const roleTotal = isRole ? stats.roleStats.find(r => r.id === nodeKey)?.hours : 0;

                return (
                    <div key={nodeKey} 
                        onClick={(e) => { e.stopPropagation(); setSelectedNode(prev => prev === nodeKey ? null : nodeKey); }}
                        onMouseEnter={() => setHoveredNode(nodeKey)} 
                        onMouseLeave={() => setHoveredNode(null)} 
                        className={`group absolute transform -translate-x-1/2 -translate-y-1/2 node-transition backdrop-blur-3xl border 
                            ${isEntity ? themes.entity : (themes[nodeData.theme] || themes.indigo)} 
                            ${isEntity ? 'w-40 p-3 rounded-xl' : (isRole ? 'w-56 p-4 rounded-[1.5rem]' : (isCategory ? 'w-48 p-2.5 rounded-xl' : 'w-40 p-2 rounded-full'))} 
                            ${isFocused ? 'glow-active ring-2 ring-indigo-400 z-[110] border-indigo-400 scale-105' : 'z-10'} 
                            ${isRelated && !isFocused ? 'border-indigo-400 ring-1 ring-indigo-400/50 z-[100]' : ''} 
                            ${visible ? 'opacity-100' : 'opacity-0 scale-95 pointer-events-none'}
                            ${activeNodeId && !isRelated && visible ? 'opacity-[0.05] grayscale blur-[2px]' : 'cursor-pointer'}`} 
                        style={{ left: `${x}%`, top: `${y}%` }}
                    >
                        {isEntity ? (
                            <div className="text-center">
                                <div className="text-[7px] font-black uppercase opacity-40 mb-1 tracking-widest">{nodeData.region}</div>
                                <div className="font-black text-[11px] uppercase tracking-tighter mb-2">{nodeData.title}</div>
                                <div className={`w-full py-1 rounded-lg flex items-center justify-center gap-1.5 transition-all ${isRelated ? 'bg-indigo-600 shadow-lg' : 'bg-white/5'}`}>
                                    <Icon name="users" size={10}/><span className="text-xs font-black">{nodeData.employeeCount}</span>
                                </div>
                                {isFocused && nodeData.breakdown && (
                                    <div className="mt-2 pt-2 border-t border-white/10 space-y-1 text-[7px] font-bold text-left animate-popup">
                                        <div className="flex justify-between"><span className="opacity-50">FT</span><span className="text-emerald-400">{nodeData.breakdown.ft}</span></div>
                                        <div className="flex justify-between"><span className="opacity-50">PT</span><span className="text-sky-400">{nodeData.breakdown.pt}</span></div>
                                        <div className="flex justify-between"><span className="opacity-50">FL</span><span className="text-amber-400">{nodeData.breakdown.fl}</span></div>
                                    </div>
                                )}
                            </div>
                        ) : isRole ? (
                            <div className="flex flex-col">
                                <div className="flex justify-between items-center mb-3">
                                    <div className="text-[9px] font-black uppercase opacity-40 tracking-widest">{nodeData.subtitle}</div>
                                    <div className="px-2 py-0.5 rounded-lg bg-indigo-500/10 text-indigo-400 text-[9px] font-black border border-indigo-500/20 flex items-center gap-1">
                                        <Icon name="users" size={10}/>{stats.roleStats.find(r => r.id === nodeKey)?.population}
                                    </div>
                                </div>
                                <div className="font-black text-base leading-none mb-3 uppercase tracking-tighter text-left">{nodeData.title}</div>
                                <div className="bg-white/5 border border-white/5 rounded-lg p-2 shadow-inner">
                                    <div className="flex justify-between items-center mb-1 text-left">
                                        <span className="text-[8px] font-black opacity-40 uppercase tracking-tighter">Capacity</span>
                                        <span className="text-[10px] font-black text-indigo-300">{roleTotal}h</span>
                                    </div>
                                    <div className="w-full bg-black/40 h-1 rounded-full overflow-hidden">
                                        <div className={`h-full rounded-full transition-all duration-1000 ${roleTotal > 40 ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]' : 'bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.5)]'}`} style={{ width: `${Math.min((roleTotal / 40) * 100, 100)}%` }}/>
                                    </div>
                                </div>
                            </div>
                        ) : isCategory ? (
                            <div className="flex justify-between items-center text-left">
                                <div className="truncate">
                                    <div className="text-[10px] font-black uppercase tracking-tight mb-0.5 truncate">{nodeData.title}</div>
                                    <div className="text-[8px] font-black opacity-30 uppercase">{(Object.values(data).filter(n => n.belongsToCat === nodeKey).reduce((s,t)=>s+(t.hours||0),0))}H WORKLOAD</div>
                                </div>
                                <div className={`p-1.5 rounded-lg transition-all ${isRelated ? 'bg-indigo-600 text-white' : 'bg-white/5 text-indigo-400'}`}>
                                    <Icon name="chevron" size={12} className={isFocused ? 'rotate-90 transition-transform' : ''}/>
                                </div>
                            </div>
                        ) : (
                            <div className="flex items-center gap-2 px-1 text-left">
                                <div className="p-1.5 bg-white/10 rounded-full text-indigo-400"><Icon name="clock" size={10}/></div>
                                <div className="truncate flex-1">
                                    <div className="text-[9px] font-bold truncate uppercase">{nodeData.title}</div>
                                    <div className="text-[7px] font-black text-indigo-300/80 mt-1 uppercase">{nodeData.hours} HRS</div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative flex flex-col p-6 md:p-8" onClick={() => setSelectedNode(null)}>
                    <header className="relative z-[200] flex flex-col lg:flex-row justify-between items-center gap-6 glass-panel p-5 rounded-[2.5rem] shadow-2xl mb-10">
                        <div className="flex items-center gap-6">
                            <div className="p-4 bg-indigo-600 rounded-[1.2rem] shadow-xl"><Icon name="shield" size={24} className="text-white"/></div>
                            <div>
                                <h1 className="text-xl font-black tracking-tighter uppercase leading-none mb-1 text-left">Strategic HR Map</h1>
                                <p className="text-[9px] font-bold opacity-40 uppercase tracking-[0.2em] text-left">Architecture & Audit Insight</p>
                            </div>
                        </div>
                        <div className="flex gap-2 bg-black/40 p-1 rounded-xl border border-white/5">
                            {['admin', 'presentation', 'analytics'].map(m => (
                                <button key={m} onClick={(e) => { e.stopPropagation(); setViewMode(m); }} className={`px-8 py-2.5 rounded-lg text-[9px] font-black transition-all tracking-widest ${viewMode === m ? 'bg-indigo-600 text-white shadow-xl' : 'text-slate-400 hover:text-white'}`}>{m.toUpperCase()}</button>
                            ))}
                        </div>
                    </header>

                    {viewMode === 'analytics' ? (
                        <div className="flex-1 glass-panel rounded-[2.5rem] p-8 lg:p-12 overflow-y-auto custom-scrollbar animate-popup">
                            <div className="max-w-6xl mx-auto space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6 text-left">
                                    <div className="bg-white/5 p-8 rounded-[2rem] border border-white/10 shadow-xl">
                                        <div className="text-[9px] font-black opacity-30 mb-4 uppercase tracking-widest"><Icon name="clock" size={12} className="inline mr-2"/> Weekly Load</div>
                                        <div className="text-5xl font-black tracking-tighter">{stats.totalHours.toFixed(1)}<span className="text-xl font-black opacity-20 ml-2">h</span></div>
                                    </div>
                                    <div className="bg-white/5 p-8 rounded-[2rem] border border-white/10 shadow-xl">
                                        <div className="text-[9px] font-black opacity-30 mb-4 uppercase tracking-widest"><Icon name="users" size={12} className="inline mr-2"/> Served Staff</div>
                                        <div className="text-5xl font-black tracking-tighter text-indigo-400">{stats.totalStaff}</div>
                                    </div>
                                    <div className="bg-white/5 p-8 rounded-[2rem] border border-white/10 shadow-xl">
                                        <div className="text-[9px] font-black opacity-30 mb-4 uppercase tracking-widest"><Icon name="bar" size={12} className="inline mr-2"/> HR:Staff Ratio</div>
                                        <div className="text-5xl font-black tracking-tighter">1:{Math.round(stats.totalStaff / 3)}</div>
                                    </div>
                                    <div className="bg-white/5 p-8 rounded-[2rem] border border-white/10 shadow-xl">
                                        <div className="text-[9px] font-black opacity-30 mb-4 uppercase tracking-widest"><Icon name="trending" size={12} className="inline mr-2"/> Entities</div>
                                        <div className="text-5xl font-black tracking-tighter text-emerald-400">7</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 text-left">
                                    <div className="bg-white/5 p-10 rounded-[2.5rem] border border-white/10 shadow-2xl">
                                        <div className="flex justify-between items-end mb-8">
                                            <h3 className="text-xs font-black opacity-40 uppercase tracking-[0.4em]">Capacity Distribution</h3>
                                            <Icon name="pie" size={20} className="opacity-20"/>
                                        </div>
                                        <div className="space-y-8">
                                            {stats.roleStats.map(r => (
                                                <div key={r.id}>
                                                    <div className="flex justify-between mb-3 text-[10px] font-black uppercase tracking-widest">
                                                        <span>{r.title}</span>
                                                        <span className={r.hours > 40 ? "text-red-400 font-black" : "text-indigo-300"}>{Math.round((r.hours / 40) * 100)}% Usage</span>
                                                    </div>
                                                    <div className="w-full bg-white/5 h-3 rounded-full overflow-hidden p-0.5 border border-white/5">
                                                        <div className={`h-full rounded-full transition-all duration-1000 ${r.hours > 40 ? 'bg-red-500 shadow-[0_0_15px_red]' : 'bg-indigo-500 shadow-[0_0_15px_indigo]'}`} style={{ width: `${Math.min((r.hours / 40) * 100, 100)}%` }}/>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-indigo-600/10 p-10 rounded-[2.5rem] border border-indigo-500/20 shadow-2xl flex flex-col">
                                        <div className="flex justify-between items-end mb-8">
                                            <h3 className="text-xs font-black text-indigo-400 uppercase tracking-[0.4em]">Operational Insights</h3>
                                            <Icon name="zap" size={20} className="text-indigo-400"/>
                                        </div>
                                        <div className="space-y-6 flex-1">
                                            <div className="flex gap-4 p-5 bg-white/5 rounded-2xl border border-white/5">
                                                <Icon name="alert" size={24} className="text-red-400 flex-shrink-0"/>
                                                <div>
                                                    <div className="text-[10px] font-black uppercase mb-1">Burnout Risk Alert</div>
                                                    <p className="text-[11px] font-medium leading-relaxed opacity-60">The HR Executive is currently operating at {Math.round((stats.roleStats.find(r=>r.id==='recruiter').hours / 40) * 100)}% capacity. The 40h yearly tax compliance block is a critical burnout risk.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-4 p-5 bg-white/5 rounded-2xl border border-white/5">
                                                <Icon name="bar" size={24} className="text-emerald-400 flex-shrink-0"/>
                                                <div>
                                                    <div className="text-[10px] font-black uppercase mb-1">Project Impact: HRIS</div>
                                                    <p className="text-[11px] font-medium leading-relaxed opacity-60">The HRIS Implementation project represents 20% of the Manager's weekly capacity. Success here will reduce administrative workload by an estimated 15% system-wide.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 relative glass-panel rounded-[3rem] border border-white/10 overflow-hidden touch-none">
                            <div ref={containerRef} className="absolute inset-0 transition-transform duration-1000" style={{ transform: `scale(${zoomLevel})` }}>
                                <div className="pointer-events-none opacity-10 h-full w-full">
                                    <div className="absolute top-0 left-[12%] h-full w-[1px] bg-white/20 flex flex-col justify-center items-center"><span className="text-[9px] font-black uppercase tracking-[0.4em] rotate-90 -translate-x-full whitespace-nowrap">Entities</span></div>
                                    <div className="absolute top-0 left-[38%] h-full w-[1px] bg-white/20 flex flex-col justify-center items-center"><span className="text-[9px] font-black uppercase tracking-[0.4em] rotate-90 -translate-x-full whitespace-nowrap">HR Roles</span></div>
                                    <div className="absolute top-0 left-[65%] h-full w-[1px] bg-white/20 flex flex-col justify-center items-center"><span className="text-[9px] font-black uppercase tracking-[0.4em] rotate-90 -translate-x-full whitespace-nowrap">Categories</span></div>
                                    <div className="absolute top-0 left-[92%] h-full w-[1px] bg-white/20 flex flex-col justify-center items-center"><span className="text-[9px] font-black uppercase tracking-[0.4em] rotate-90 -translate-x-full whitespace-nowrap">Job Details</span></div>
                                </div>
                                
                                {Object.entries(data).filter(([k,v]) => v.type === 'role').map(([k, v]) => v.reportsTo?.map(ent => (
                                    <Connection key={`${k}-${ent}`} start={coords[ent]} end={coords[k]} color="#6366F1" isReporting={true} active={activeNodeId === k || activeNodeId === ent} isFaint={activeNodeId && activeNodeId !== k && activeNodeId !== ent} visible={true}/>
                                )))}

                                {Object.entries(data).filter(([k,v]) => v.type === 'category').map(([k, v]) => (
                                    <Connection key={`${k}-cat`} start={coords[v.belongsTo]} end={coords[k]} color="#818CF8" active={activeNodeId === k || activeNodeId === v.belongsTo || data[activeNodeId]?.belongsToCat === k} pulsing={true} visible={isNodeVisible(k)}/>
                                ))}

                                {Object.entries(data).filter(([k,v]) => v.type === 'task').map(([k, v]) => (
                                    <Connection key={`${k}-task`} start={coords[v.belongsToCat]} end={coords[k]} color="#818CF8" active={activeNodeId === k || activeNodeId === v.belongsToCat} pulsing={true} visible={isNodeVisible(k)}/>
                                ))}

                                {Object.keys(data).map(nodeKey => renderNode(nodeKey))}
                            </div>

                            <div className="absolute bottom-10 right-10 flex bg-black/80 backdrop-blur-xl border border-white/10 rounded-2xl p-1 z-[300] shadow-2xl scale-110" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setZoomLevel(p => Math.max(0.4, p - 0.1))} className="p-3 text-slate-400 hover:text-white transition-all"><Icon name="clock" size={18} className="rotate-180"/></button>
                                <div className="flex items-center px-4 text-[10px] font-black border-x border-white/10 w-16 justify-center tracking-tighter">{Math.round(zoomLevel * 100)}%</div>
                                <button onClick={() => setZoomLevel(p => Math.min(2, p + 0.1))} className="p-3 text-slate-400 hover:text-white transition-all"><Icon name="chevron" size={18} className="rotate-0"/></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
